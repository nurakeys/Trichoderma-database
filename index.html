is performance using only cheap Brazilian agricultural residues."}, {"id": 40, "year": 2017, "title": "A novel transcription factor specifically regulates GH11 xylanase genes in Trichoderma reesei\n", "doi": "https://doi.org/10.1186/s13068-017-0878-x", "species": "Trichoderma reesei", "strain": "Δsxlr", "target": "XYN1, XYN2, XYN5", "strategy": "Transcription factor engineering — deletion of novel repressor SxlR", "promoter": "native", "signal_peptide": "native", "yield": "", "units": "", "key_results": "- Δsxlr increased xylanase activity 0.7–1.4-fold (wheat bran/Avicel), 1.3-fold (xylan), and up to 14.2-fold (lactose) over RUT-C30, with no effect on cellulase activity. \n- SxlR binds xyn1, xyn2, xyn5 promoters directly (EMSA confirmed); binding motif 5′-CATCSGSWCWMSA-3′ identified. \n- Straw hydrolysis improved by ~50% over parental strain.", "description": "A novel transcription factor specifically regulates GH11 xylanase genes in Trichoderma reesei. Used bioinformatics screening and CRISPR/Cas9-based deletion to identify and characterize SxlR, a Zn₂Cys₆ transcription factor that specifically represses GH11 xylanase genes (xyn1, xyn2, xyn5) without affecting cellulase expression. Deletion of sxlr in RUT-C30 increased xylanase activity up to 14.2-fold on lactose and improved straw hydrolysis by ~50%, while cellulase activity remained unchanged. EMSA confirmed direct binding of SxlR to GH11 xylanase promoters; consensus binding motif identified as 5′-CATCSGSWCWMSA-3′. Establishes SxlR as a specific engineering target to improve the xylanase-to-cellulase ratio in T. reesei without compromising cellulase output."}, {"id": 41, "year": 2017, "title": "Cellulase hyper-production by Trichoderma reesei mutant SEU-7 on lactose", "doi": "https://doi.org/10.1186/s13068-017-0915-9", "species": "Trichoderma reesei", "strain": "SEU-7 ", "target": "BGL1, native cellulase/hemicellulase secretome", "strategy": "Gene overexpression + insertional mutagenesis via Agrobacterium tumefaciens-mediated transformation (AMT)", "promoter": "Modified cbh1", "signal_peptide": "native", "yield": "", "units": "", "key_results": "- SEU-7 achieved 13.0 IU/mL FPase and 81.0 IU/mL pNPGase in batch culture on 3% lactose — highest reported for T. reesei on lactose. \n- Fed-batch yielded 47.0 IU/mL FPase and 144.0 IU/mL pNPGase — highest pNPGase reported for T. reesei on any carbon source. \n- First T. reesei strain where lactose induction efficiency exceeded cellulose. \n- Saccharification of pretreated corn stover improved 4–5× over RUT-C30. Upregulation of CRT1, KAP8, ACE3, XYR1, and hemicellulase genes confirmed by qRT-PCR.", "description": "Cellulase hyper-production by Trichoderma reesei mutant SEU-7 on lactose. Overexpressed endogenous BGL1 (β-glucosidase) in T. reesei RUT-C30 via Agrobacterium-mediated random insertional mutagenesis, screening transformants for improved cellulase production on lactose. Mutant SEU-7 had two copies of BGL1 inserted at a non-coding chromosomal locus. SEU-7 achieved 13.0 IU/mL FPase and 81.0 IU/mL pNPGase in batch culture on 3% lactose — the highest reported for T. reesei on lactose — and 47.0 IU/mL FPase and 144.0 IU/mL pNPGase in fed-batch culture. First T. reesei strain reported where lactose induction efficiency exceeded cellulose. Saccharification of pretreated corn stover improved 4–5× over RUT-C30. Enhanced performance attributed to both BGL1 overexpression and a collateral chromosomal deletion."}, {"id": 42, "year": 2017, "title": "Production of the versatile cellulase for cellulose bioconversion and cellulase inducer synthesis by genetic improvement of Trichoderma reesei", "doi": "https://doi.org/10.1186/s13068-017-0963-1", "species": "Trichoderma reesei", "strain": "SCB18", "target": "BGLA, native cellulase complex", "strategy": "Transcription factor engineering (cre1 deletion) + heterologous expression (A. niger bglA overexpression)", "promoter": "cbh1", "signal_peptide": "native", "yield": "", "units": "", "key_results": "- cre1 deletion (SDC11) gave 72.6% higher FPA, with EG, CBH, and BGL activities increased 48.3%, 42.4%, and 44.6% respectively vs. SP4; however saccharification efficiency was slightly reduced due to lower BGL:FPA ratio (0.57 vs 0.68). \n- bglA overexpression in SCB18 raised BGL activity to 103.9 IU/mL — 51.3× parental SDC11 and highest reported for T. reesei at time of publication. \n- SCB18 FPA 4.6 IU/mL, 29.8% higher than SDC11. \n- SCB18 achieved 96.6% cellulose conversion of delignified corncob residue vs 44.7% for SDC11. \n- SCB18 crude enzyme catalyzed transglycosylation of 60% glucose to produce cellobiose, sophorose, and gentiobiose (peak 17.6% glucose conversion at 2 days). \n- Transglycosylation product used as inducer gave 63% higher FPA than lactose in SDC11.", "description": "Production of the versatile cellulase for cellulose bioconversion and cellulase inducer synthesis by genetic improvement of Trichoderma reesei. Engineered T. reesei SP4 through two sequential genetic manipulations to construct a versatile cellulase system with enhanced saccharification capacity and the ability to synthesize cellulase-inducing β-disaccharides. First, the carbon catabolite repressor gene cre1 was deleted via a Δcre1::pyrG cassette, followed by 5-FOA-mediated pyrG marker excision to give the markerless strain SDC11. Second, the A. niger BGLA-encoding gene bglA was overexpressed under the cbh1 promoter in SDC11 to generate SCB18. Best result: SCB18 produced 103.9 IU/mL BGL activity (51.3× parental, highest reported for T. reesei), achieved 96.6% cellulose conversion of delignified corncob residue, and its crude enzyme preparation synthesized cellobiose, sophorose, and gentiobiose via transglycosylation from 60% glucose — with the transglycosylation product providing 63% higher cellulase induction than lactose when used as inducer."}, {"id": 43, "year": 2018, "title": "A versatile system for fast screening and isolation of Trichoderma reesei cellulase hyperproducers based on DsRed and fluorescence-assisted cell sorting", "doi": "https://doi.org/10.1186/s13068-018-1264-z", "species": "Trichoderma reesei", "strain": "SUS2, SUS3, SUS4", "target": "DsRed reporter protein (intracellular or surface-displayed)", "strategy": "DsRed reporter under cbh1 promoter coupled with FACS screening for cellulase hyperproducers", "promoter": "cbh1", "signal_peptide": "cbh1", "yield": "", "units": "", "key_results": "- FACS rapidly identified cellulase hyperproducers. \n- ace3 transformants showed increased cellulase production and protein secretion.\n- ARTP mutants reached up to 46.0 U/mL endoglucanase and 0.45 mg/mL extracellular protein vs 34.2 U/mL and 0.35 mg/mL in parent strain. \n- Surface-display screening identified beneficial overexpression of hac1 and bip1.\n- Agrobacterium insertion mutants reached 26.3–33.3 U/mL endoglucanase vs 11.1 U/mL in parent strain.", "description": "A versatile system for fast screening and isolation of Trichoderma reesei cellulase hyperproducers based on DsRed and fluorescence-assisted cell sorting. Researchers developed a high-throughput DsRed-FACS screening platform for rapidly isolating improved T. reesei strains. By linking DsRed expression to the cellulase cbh1 promoter and sorting highly fluorescent spores, they successfully identified cellulase hyperproducers from genetic engineering, random mutagenesis, and insertional mutagenesis libraries. Surface-displayed DsRed also enabled discovery of secretion-enhancing factors such as hac1 and bip1, providing a useful tool for future cellulase and heterologous protein strain engineering."}, {"id": 44, "year": 2018, "title": "A copper-controlled RNA interference system for reversible silencing of target genes in Trichoderma reesei", "doi": "https://doi.org/10.1186/s13068-018-1038-7", "species": "Trichoderma reesei", "strain": "Ptcu1–xyr1KD, Ptcu1–cel7aKD, Ptcu1–pyr4KD, Ptcu1–fab1KD (engineered RNAi strains in QM9414 or TU-6 background)", "target": "XYR1, CEL7A, PYR4, FAB1", "strategy": "RNAi engineering + promoter engineering (copper-responsive gene silencing system)", "promoter": "Ptcu1 (copper-responsive)", "signal_peptide": "", "yield": "", "units": "", "key_results": "- Copper-controlled RNAi successfully silenced all four target genes in the absence of copper, with phenotypes fully reversible upon copper addition. \n- xyr1 knockdown abolished FPA and total secreted protein to levels comparable to Δxyr1; cel7a knockdown abolished CEL7A detection by Western blot. \n- fab1 knockdown reduced cellulase production by ~80% without affecting transcription of cel7a/cel7b, implicating FAB1 in post-transcriptional cellulase regulation. \n- System is nutrition-state independent, applicable across carbon sources.", "description": "A copper-controlled RNA interference system for reversible silencing of target genes in T. reesei. Engineered T. reesei to enable controllable, reversible gene silencing by developing a copper-responsive RNAi system using the Ptcu1 promoter to drive hairpin RNA expression. The hpRNA cassette — containing a tandem inverted repeat of the target gene fragment separated by a cel5a intron — is transcribed in the absence of copper and silenced upon addition of 20 μM CuSO4, enabling on/off control independent of nutritional state. Applied to four target genes: pyr4 (proof-of-concept), xyr1 and cel7a (cellulase regulon), and fab1 (essential gene refractory to knockout). Best result: Complete, reversible knockdown of xyr1 and cel7a abolished cellulase production to Δxyr1 levels; fab1 silencing reduced cellulase production ~80% without affecting cellulase gene transcription, revealing a novel post-transcriptional role for FAB1 in cellulase secretion."}, {"id": 45, "year": 2018, "title": "Constitutive hyperproduction of sorbicillinoids in Trichoderma reesei ZC121", "doi": "https://doi.org/10.1186/s13068-018-1296-4", "species": "Trichoderma reesei", "strain": "ZC121", "target": "", "strategy": "Insertional mutagenesis (off-target AMT)", "promoter": "", "signal_peptide": "", "yield": "", "units": "", "key_results": "- ZC121 produced sorbicillinoids constitutively across all tested carbon sources, light conditions, pH, and temperatures. \n- Peak yield 627 μg/mL on glucose (OD370=17.3) — highest reported at time of publication. \n- On cellulose, sorbicillinoid production increased 6-fold over RUT-C30 while cellulase production was nearly abolished. \n- Transcriptomics confirmed upregulation of all sorbicillinoid cluster genes and downregulation of 42 cellulase-related genes on cellulose.", "description": "Constitutive hyperproduction of sorbicillinoids in T. reesei ZC121 via off-target insertional mutagenesis. Attempted knockout of gene 121121 in RUT-C30 via AMT resulted in off-target insertion of the knockout cassette at the telomere of chromosome IV, generating strain ZC121. The strain produced sorbicillinoids constitutively across all carbon sources, light conditions, pH, and temperatures — with peak production of 627 μg/mL on glucose, the highest reported at time of publication. Growth on cellulose caused an overwhelming shift from cellulase to sorbicillinoid production, with transcriptomics confirming upregulation of all sorbicillinoid cluster genes and downregulation of 42 cellulase production genes. Sorbicillinol and bisvertinolone were the two major products identified by LC-MS. First demonstration of T. reesei directly degrading cellulose to produce a valuable chemical compound rather than protein."}, {"id": 46, "year": 2018, "title": "A long noncoding RNA promotes cellulase expression in Trichoderma reesei", "doi": "https://doi.org/10.1186/s13068-018-1081-4", "species": "Trichoderma reesei", "strain": "QM6a_OEhax1Rut-C30", "target": "HAX1 (long noncoding RNA; native regulatory factor)", "strategy": "Regulatory RNA engineering (lncRNA disruption and overexpression)", "promoter": "bgl1", "signal_peptide": "", "yield": "", "units": "", "key_results": "- HAX1 is the first lncRNA described in a filamentous fungus, exclusive to T. reesei with no homologues in related species.\n- Longer HAX1 versions had greater impact on cellulase activity: overexpression of hax1Rut-C30 in QM6a gave a 5-fold increase in cellulase activity versus 3-fold for QM9414_Dhax1 strains. \n- HAX1 acts in trans on distal cellulase targets. Longer HAX1 variants are enriched in hypercellulolytic strains, suggesting evolutionary improvement correlated with strain hyperproduction phenotype.", "description": "A long noncoding RNA promotes cellulase expression in Trichoderma reesei. Identified HAX1, the first lncRNA in filamentous fungi, through accidental amdS marker integration at the hax1 locus in QM9414, which caused ~50% reduction in cellulase and β-glucosidase activity. Three strain-specific HAX1 versions were characterized (QM6a: 262 nt, QM9414: 299 nt, Rut-C30: 428 nt), differing in transcription start site but sharing the same 3′-end. Longer HAX1 versions predominate in hypercellulolytic strains. Overexpression of all three versions under the bgl1 promoter at the pyr4 locus rescued the cellulase-depleted phenotype in QM9414_Dhax1 strains and enhanced cellulase activity in wild-type QM6a, with the longest Rut-C30 version giving up to 5-fold improvement. HAX1 acts in trans on distal cellulase gene targets and has no homologues outside T. reesei, establishing it as a novel strain engineering target."}, {"id": 47, "year": 2018, "title": "Engineering enhanced cellobiohydrolase activity", "doi": "https://doi.org/10.1038/s41467-018-03501-8", "species": "Trichoderma reesei", "strain": "AST1116", "target": "PfCel7A and TrCel7A chimeras and mutants", "strategy": "Enzyme engineering + heterologous expression + domain swapping + site-directed mutagenesis", "promoter": "eno", "signal_peptide": "native", "yield": "", "units": "", "key_results": "- PfCel7A reached 80% PCS conversion 1.6× faster than TrCel7A (38h vs 62h). \n- Domain swapping showed the PfCel7A catalytic domain is the primary driver of superior activity. \n- TrCel7A double mutant T1/T3 (disulfide removal C4G/C72A + A1 loop three-residue deletion) achieved near-equivalent activity to WT PfCel7A, representing >60% improvement over WT TrCel7A. \n- MD simulations attributed improvement to increased substrate flexibility at the tunnel entrance and loop rearrangements.", "description": "Engineering enhanced cellobiohydrolase activity. Expressed a library of GH7 cellobiohydrolase variants — including wild-type TrCel7A, wild-type PfCel7A (Penicillium funiculosum), domain-swap chimeras, and catalytic domain mutants — in T. reesei AST1116 using the eno promoter (pTrEno vector). PfCel7A showed 1.6× greater activity on pretreated corn stover than TrCel7A. Domain swapping identified the PfCel7A catalytic domain as the primary driver of this improvement. Crystal structure of PfCel7A CD (1.70 Å) guided construction of a TrCel7A mutant library, revealing that two changes — removal of a disulfide bond (C4G/C72A) and a three-residue A1 loop deletion — together produced a TrCel7A double mutant with activity approaching wild-type PfCel7A, a >60% improvement. MD simulations linked the gains to increased substrate flexibility at the tunnel entrance."}, {"id": 48, "year": 2019, "title": "Novel genetic tools that enable highly pure protein production in Trichoderma reesei\n", "doi": "https://doi.org/10.1038/s41598-019-41573-8", "species": "Trichoderma reesei", "strain": "QM9414-derived Δmus53 Δpyr4 strain", "target": "Lipase B (CalB) from Candida antarctica", "strategy": "Synthetic expression system (SES) and CRISPR/Cas9-mediated strain engineering", "promoter": "SES synthetic promoter (sTF-dependent)", "signal_peptide": "α-amylase", "yield": "4.6", "units": "g/L", "key_results": "- Produced 4.6 g/L recombinant CalB in glucose medium. \n- CalB constituted ~75% of secreted protein and showed specific activity up to 159% of commercial CalB. \n- High-level production was achieved without cellulase induction.", "description": "Novel genetic tools that enable highly pure protein production in T. reesei. Combined multiplex CRISPR/Cas9 genome engineering with a Synthetic Expression System (SES) to create a high-purity protein production platform in T. reesei. Major cellulase genes (cbh1, cbh2, egl1, and egl2) were replaced with CalB (Candida antarctica lipase B) expression cassettes, reducing secretion of unwanted native enzymes. Multiple secretion strategies were evaluated, with an Aspergillus awamori α-amylase signal peptide ultimately providing the best performance. The engineered strain produced 4.6 g/L recombinant CalB in glucose medium, with CalB comprising ~75% of secreted protein and exhibiting 159% of the specific activity of commercial CalB. Demonstrates that constitutive SES-driven expression coupled with multiplex genome engineering enables high-level, inducer-free production of highly pure recombinant proteins in T. reesei."}, {"id": 49, "year": 2019, "title": "Simultaneous enhancement of the beta–exo synergism and exo–exo synergism in Trichoderma reesei cellulase to increase the cellulose degrading capability\n", "doi": "https://doi.org/10.1186/s12934-019-1060-x", "species": "Trichoderma reesei", "strain": "Rut-C30", "target": "bgl1, cbh2", "strategy": "Multi-gene co-expression / Rationally balancing cellulase synergistic ratios", "promoter": "cbh1", "signal_peptide": "cbh1", "yield": "", "units": "", "key_results": "- BGL1 + CBH2: E7 achieved 7.21 FPIU/mL and F6 achieved 7.69 FPIU/mL — approximately 3× parental RutC-30 (2.45 FPIU/mL). \n- Enzymatic hydrolysis yield of steam-exploded corn stover improved from 67.22% (RutC-30) to 87.98% (E7) and 86.50% (F6). \n-Substrate loading for 1 g glucose release decreased significantly. \n- F6 slightly outperformed E7, suggesting A. niger BGL1 integrates better with the T. reesei cellulase system than A. aculeatus BGL1.", "description": "Simultaneous enhancement of the beta-exo synergism and exo-exo synergism in Trichoderma reesei cellulase to increase the cellulose degrading capability. Engineered T. reesei to balance its native secretome composition and eliminate metabolic feedback bottlenecks during industrial biomass saccharification. Overcame cellobiose accumulation and sub-optimal processive degradation limitations by developing a multigene co-expression platform inside a single fungal cell factory. Successfully regulated the joint overexpression of cellobiohydrolase II (cbh2) and various beta-glucosidases (native Trbgl1 or codon-optimized heterologous variants from Aspergillus aculeatus and Aspergillus niger) under the tight control of the strong, uniform T. reesei cbh1 promoter and signal peptide. Best result: Generated specialized engineered strains capable of producing an optimized, self-sufficient enzyme cocktail that maximizes total reducing sugar release from complex steam-exploded corn stover without requiring \nexternal enzymatic supplements."}, {"id": 50, "year": 2019, "title": "Deletion of either the regulatory gene ara1 or metabolic gene xki1 in Trichoderma reesei leads to increased CAZyme gene expression on crude plant biomass", "doi": "https://doi.org/10.1186/s13068-019-1422-y", "species": "Trichoderma reesei", "strain": "CBS143327 (Δxyr1), CBS143330 (Δara1), CBS143332 (Δxki1)", "target": "CAZyme secretome (native)", "strategy": "Gene deletion + transcriptomics", "promoter": "", "signal_peptide": "native", "yield": "", "units": "", "key_results": "- CS induced broader and higher CAZyme expression than SBH; SBH preferentially induced pectinolytic and mannanolytic genes.\n- XYR1 is the dominant regulator on CS; ARA1 has a stronger role on SBH, correlating with its higher l-arabinose and d-galactose content.\n- Both Δara1 and Δxki1 showed reduced CAZyme expression at 4h but significantly higher expression at later time points (24h on CS, 24h and 48h on SBH) compared to the reference — predominantly XYR1-target genes.\n- Δxki1 effects were more extreme than Δara1, suggesting inducer (xylitol/l-arabitol) accumulation as the mechanism driving sustained XYR1 activation.\n- Deleting xki1 proposed as a strategy to sustain CAZyme induction longer on crude plant biomass substrates at industrial scale.", "description": "Deletion of either the regulatory gene ara1 or metabolic gene xki1 in Trichoderma reesei leads to increased CAZyme gene expression on crude plant biomass. Investigated the transcriptomic response of T. reesei QM9414 and three deletion mutants (Δxyr1, Δara1, Δxki1) during growth on corn stover (CS) and soybean hulls (SBH) over 4h, 24h, and 48h using RNA-seq. CS induced a broader and higher set of CAZyme genes than SBH, with XYR1 as the dominant regulator on CS and ARA1 playing a stronger role on SBH due to its higher l-arabinose and d-galactose content. Both Δara1 and Δxki1 showed reduced CAZyme expression at early time points but significantly elevated expression at later time points, predominantly of XYR1-target genes including major cellulases and xylanases. The Δxki1 effect was more pronounced, attributed to accumulation of pentose inducers (xylitol, l-arabitol) that sustain XYR1 activation. Deletion of xki1 is proposed as a strategy to prolong CAZyme induction on crude plant biomass substrates at industrial scale."}, {"id": 51, "year": 2019, "title": "Deletion of the small GTPase rac1 in Trichoderma reesei provokes hyperbranching and impacts growth and cellulase production", "doi": "https://doi.org/10.1186/s40694-019-0078-5", "species": "Trichoderma reesei", "strain": "T. reesei K1 (Δrac1)", "target": "CEL12A (native endoglucanase, overexpressed as reporter); native cellulase secretome", "strategy": "Morphological engineering (gene deletion) + heterologous expression", "promoter": "cDNA1", "signal_peptide": "native", "yield": "", "units": "", "key_results": "- Δrac1 provokes strong hyperbranching and apolar growth on all carbon sources, with shorter central hyphae, larger hyphal diameter, more apical tips, and more dispersed mycelium.\n- Cellulase activity on lactose peaked at ~3× the reference strain K1 at 72h, accompanied by ~3× upregulation of cel7a transcripts; no improvement observed on glucose or cellulose.\n- Total secreted protein on lactose was comparable between strains at 72h, but specific cellulase activity per total protein was higher in Δrac1, indicating enrichment of active cellulases in the secretome.\n- Biomass formation was increased on glucose and slightly enhanced on cellulose in Δrac1, but unchanged on lactose.\n- Broth viscosity in fed-batch cultivation was not significantly affected by rac1 deletion despite the dramatic morphological changes.", "description": "Deletion of the small GTPase rac1 in Trichoderma reesei provokes hyperbranching and impacts growth and cellulase production. Morphologically engineered T. reesei by deleting the Rho GTPase rac1 (tre47055) in a reference strain K1 carrying a CEL12A overexpression cassette under the constitutive PcDNA1 promoter. Δrac1 strains exhibited strong hyperbranching and apolar growth on all carbon sources, with shorter, thicker hyphae and more apical tips. Cellulase activity on lactose was increased ~3-fold at 72h, accompanied by upregulation of cel7a transcripts, while no improvement was observed on glucose or cellulose. Total secreted protein was unchanged, but specific cellulase activity per protein was higher in Δrac1, indicating a shift in secretome composition. Biomass formation was carbon source-dependent, increasing on glucose and cellulose but unchanged on lactose. Fed-batch viscosity was unaffected despite the dramatic morphological changes, suggesting Δrac1 as a potential platform for further strain engineering."}, {"id": 52, "year": 2019, "title": "Fusion transcription factors for strong, constitutive expression of cellulases and xylanases in Trichoderma reesei", "doi": "https://doi.org/10.1186/s13068-019-1575-8", "species": "Trichoderma reesei", "strain": "TXY(1), TXZ(0b), TX(WT)", "target": "CBHI, CBHII, EGLI, XYNI, XYNII, BXLI", "strategy": "Transcription factor engineering — fusion TFs combining Xyr1 DNA-binding domain with Ypr1 or Ypr2 transactivation domains", "promoter": "tef1", "signal_peptide": "native", "yield": "", "units": "", "key_results": "- TXY(1) produced 10,000 U/g endo-xylanase on glycerol — over 2× the highest TX(WT) level. \n- XY1 induced cellulases and xylanases nearly carbon source independently, including on lactose where Xyr1 overexpression failed. \n- TXZ(0b) produced xylanases and cellulases constitutively at moderate levels across all carbon sources. Confirmed Ypr2 contains a transactivating domain.", "description": "Fusion transcription factors for constitutive cellulase and xylanase expression in T. reesei. Constructed a Xyr1-deficient platform strain (Xyr1′(81)) by introducing a nonsense mutation at position 81, then inserted fusion TFs — XY1 (Xyr1 DNA-binding domain fused to Ypr1 transactivation domain) and XZ0b (Xyr1 DBD fused to Ypr2) — at the pyr4 locus under the tef1 promoter. XY1 induced cellulases and xylanases nearly carbon source independently, with outstanding endo-xylanase production of 10,000 U/g on glycerol — over 2× higher than Xyr1 overexpression on its best carbon source. XZ0b produced moderate but constitutive xylanase and cellulase activity across all carbon sources. Xyr1 overexpression alone enhanced xylanolytic activity on xylan but paradoxically abolished cellulase production on lactose"}, {"id": 53, "year": 2019, "title": "Enhancement of Cellulase Production in Trichoderma reesei via Disruption of Multiple Protease Genes Identified by Comparative Secretomics", "doi": "https://doi.org/10.3389/fmicb.2019.02784", "species": "Trichoderma reesei", "strain": "ΔP70", "target": "Native cellulase complex (CBH, EG, BGL, XYN)", "strategy": "Host engineering — sequential and multiplex protease gene deletion via comparative secretomics", "promoter": "", "signal_peptide": "", "yield": "", "units": "", "key_results": "- ΔP70 showed 78% reduction in extracellular protease activity and 6-fold higher FPA (2.08 vs 0.32 IU/mL) at 168h vs parental QM9414Δmus53 on CSL medium. BGL, CBH, EG, and xylanase activities increased 150%, 75%, 65%, and 6% respectively.\n- Individual single deletions of tre123234 alone reduced protease activity by 55%. \n- Triple deletion was achieved at low frequency (2/80 transformants) via one-step co-transformation. \n- No growth defects on any carbon or nitrogen source tested. \n- Establishes comparative secretomics as an efficient strategy for identifying protease targets, and multiplex deletion as a viable one-step approach for constructing low-protease cellulase production strains in T. reesei.", "description": "Enhancement of Cellulase Production in Trichoderma reesei via Disruption of Multiple Protease Genes Identified by Comparative Secretomics. Used LC-MS/MS comparative secretomics to identify 12 extracellular proteases accumulating during cellulase fermentation with corn steep liquor (CSL) as the nitrogen source in QM9414Δmus53. Individual deletions narrowed the key culprits to tre81070 (aminopeptidase), tre120998 (serine carboxypeptidase), and tre123234 (subtilisin-related protease). All three were simultaneously knocked out in a single transformation step to generate the triple-deletion strain ΔP70. Best result: ΔP70 showed a 78% decrease in protease activity and a 6-fold increase in total cellulase activity (FPA) at late fermentation stages (168h), with BGL and CBH activities increasing 150% and 75% respectively, and no growth penalty."}, {"id": 54, "year": 2019, "title": "Use of fusion transcription factors to reprogram cellulase transcription and enable efficient cellulase production in Trichoderma reesei", "doi": "https://doi.org/10.1186/s13068-019-1589-2", "species": "Trichoderma reesei", "strain": "Kuace2, Kuxyr1", "target": "Native cellulase complex (CBH1/CEL7A, cellulase secretome)", "strategy": "Transcription factor engineering — fusion transcription factors (fTFs) combining Cre1/Ace1 zinc finger DNA-binding domains with activation domains of cellulase activators (Ace2 or Xyr1)", "promoter": "cre1", "signal_peptide": "", "yield": "", "units": "", "key_results": "- Kuace2 showed ~100-fold upregulation of cel7a at 6–8h on lactose; Kuxyr1 showed ~77-fold at 8h. \n- xyr1 transcription significantly upregulated in all four fTF strains. \n- In 3-L fed-batch fermentation at 180h, Kuace2 and Kuxyr1 achieved 3.2× and 2.1× higher pNPCase titers than the parent strain, and 6.1× and 3.9× higher than the Δcre1 strain respectively. \n- Biomass accumulation in Kuace2 and Kuxyr1 was equivalent to the parent, whereas Δcre1 reached only ~25–33% of their biomass. \n- No hyphal growth defects observed in fTF strains, unlike Δcre1 which showed shorter, thicker hyphae.", "description": "Use of fusion transcription factors to reprogram cellulase transcription and enable efficient cellulase production in Trichoderma reesei. Designed four fusion transcription factors (fTFs) — Sace3, Sclr2, Sace2, and Sxyr1 — by fusing the zinc finger DNA-binding domains of the cellulase repressors Cre1 and Ace1 with the activation domains of cellulase activators (Ace3, Clr2, Ace2, or Xyr1). The strategy competes for Cre1/Ace1 binding sites to relieve CCR while leaving endogenous Cre1 intact to maintain normal hyphal growth. All four fTFs were integrated at the ku70 locus in T. reesei Δtku70 under the cre1 promoter. Best result: Kuace2 and Kuxyr1 showed 3.2× and 2.1× higher pNPCase titers than the parent in 3-L fed-batch fermentation, and 6.1× and 3.9× higher than Δcre1, while maintaining equivalent biomass — demonstrating that fTF-based CCR attenuation improves cellulase production without the growth penalty associated with cre1 deletion."}, {"id": 55, "year": 2020, "title": "Assessment of the ptxD gene as a growth and selective marker in Trichoderma atroviride using Pccg6, a novel constitutive promoter\n", "doi": "https://doi.org/10.1186/s12934-020-01326-z", "species": "Trichoderma atroviride", "strain": "IMI206040", "target": "PTXD\n(Pseudomonas stutzeri)", "strategy": "Promoter engineering + selectable marker development", "promoter": "pccg6\n(T. atroviride)", "signal_peptide": "native", "yield": "", "units": "", "key_results": "- PTXD: Successfully expressed under Pccg6 and pki1 in T. atroviride; transgenic strains grew on phosphite as sole P source while wild type could not.\n- Pccg6 drove constitutive expression at levels comparable to pki1.\n- PTXD additionally gives T. atroviride a competitive growth advantage over bacterial contaminants in phosphite-supplemented media, with potential as a contamination control system in industrial fermentations.", "description": "Assessment of ptxD gene as marker in T. atroviride. using Pccg6 Identified Pccg6 as a novel constitutive promoter in T. atroviride via RNA-seq, with transcriptional strength comparable to pki1. Used it to drive expression of codon-optimized PTXD (Pseudomonas stutzeri), enabling growth on phosphite as sole phosphorus source — providing a novel dominant selectable marker that requires no auxotrophic background and works across diverse growth conditions."}, {"id": 56, "year": 2020, "title": "Modification of transcriptional factor ACE3 enhances protein production in Trichoderma reesei in the absence of cellulase gene inducer", "doi": "https://doi.org/10.1186/s13068-020-01778-w", "species": "Trichoderma reesei", "strain": "RL-P37", "target": "CBH1, CBH2, EGL1, EGL2, and native hemicellulase secretome", "strategy": "Transcription factor engineering through overexpression of ace3-L", "promoter": "dic1", "signal_peptide": "", "yield": "", "units": "", "key_results": "- Overexpression of ace3-L enabled high-level cellulase and hemicellulase production using glucose as the sole carbon source.\n- Secreted protein production increased ~30-fold on glucose compared with the parental strain under non-inducing conditions.\n- Protein production increased ~3-fold under lactose-inducing conditions.\n- Intact Zn2Cys6 DNA-binding domain and a 7–17 amino acid C-terminal truncation were required for enhanced productivity.\n- Industrial strain T4abc showed improved protein production under both inducing and non-inducing fermentation conditions.\n- Demonstrated an inducer-free strategy for enzyme production in Trichoderma reesei.", "description": "Modification of transcriptional factor ACE3 enhances protein production in Trichoderma reesei in the absence of cellulase gene inducer. Researchers engineered the transcription factor ACE3 in Trichoderma reesei by overexpressing a modified ace3-L variant containing an intact Zn2Cys6 DNA-binding domain and a truncated C-terminus. The engineered strains produced high levels of native cellulases (CBH1, CBH2, EGL1, and EGL2) and associated hemicellulases using glucose as the sole carbon source, eliminating the need for traditional inducers such as lactose or sophorose. Overexpression of ACE3 significantly increased secreted protein production under both inducing and non-inducing conditions and was successfully validated in an industrial production strain. This work established ACE3 engineering as a powerful strategy for inducer-free enzyme production and improving the protein expression capacity of T. reesei."}, {"id": 57, "year": 2020, "title": "Rational engineering of the Trichoderma reesei RUT-C30 strain into an industrially relevant platform for cellulase production", "doi": "https://doi.org/10.1186/s13068-020-01732-w", "species": "Trichoderma reesei", "strain": "Br_TrR03", "target": "CEL3A β-glucosidase (Talaromyces emersonii) + SUC1 invertase (Aspergillus niger) + XYR1-V821F (mutated T. reesei transcription factor)", "strategy": "Strain engineering (CRISPR/Cas9) + promoter engineering + heterologous enzyme expression + transcription factor engineering + protease deletion", "promoter": "pdc1 (xyr1-V821F), xyn1 (cel3a), native suc1", "signal_peptide": "native", "yield": "80.6", "units": "g/L", "key_results": "- TeCEL3A: β-glucosidase specific activity increased ~72-fold vs. RUT-C30. XYR1-V821F + Δace1: ~3× increase in extracellular protein titer on both lactose and glucose vs. parental. \n- SUC1 + Δpep1: Enabled sucrose utilization; ~24% further improvement in bioreactor productivity. \n- Br_TrR03 overall: 80.6 g/L total protein at 0.24 g/L/h — highest experimentally supported titer reported for T. reesei. \n- Xylanase specific activity increased ~42-fold. \n- Saccharification efficiency on pretreated sugarcane straw comparable to commercial CTec2 preparation. \n- No cellobiose accumulation in saccharification assay.", "description": "Rational engineering of the T. reesei RUT-C30 strain into an industrially relevant platform for cellulase production. Applied three rounds of CRISPR/Cas9 editing to introduce six markerless genetic modifications into RUT-C30: heterologous TeCel3A (β-glucosidase) at the slp1 locus, gain-of-function XYR1-V821F at the ace1 locus, and AnSuc1 (invertase) at the pep1 locus — simultaneously deleting slp1, ace1, and pep1. Fermented on low-cost sugarcane molasses + yeast medium. Best result: Final strain Br_TrR03 achieved 80.6 g/L total secreted protein at 0.24 g/L/h — the highest experimentally supported titer reported for T. reesei — with 72-fold higher β-glucosidase activity, 42-fold higher xylanase activity, and saccharification performance comparable to commercial CTec2."}, {"id": 58, "year": 2020, "title": "Improved Production of Majority Cellulases in Trichoderma reesei by Integration of cbh1 Gene From Chaetomium thermophilum", "doi": "https://doi.org/10.3389/fmicb.2020.01633", "species": "Trichoderma reesei", "strain": "Tu61ku70", "target": "CBH1 (Chaetomium thermophilum)", "strategy": "Heterologous expression + locus replacement (cbh1 locus)", "promoter": "cbh1 (native, in final strain Tr-Ctcbh1)", "signal_peptide": "native", "yield": "", "units": "", "key_results": "- Ct-CBH1 specific activity ~4.5× higher than Tr-CBH1; optimum temperature 70°C vs 60°C for Tr-CBH1; both have pH optimum of 4.0. \n- Tr-Ctcbh1: CBH activity 4.1×, FPA 2.2×, endoglucanase 1.9×, β-glucosidase 2.3× higher than control; no cellobiose accumulation detected. \n- Increased cellulase production occurred at transcriptional level: eg1 +1.7×, eg2 +1.5×, cbh2 +1.8×, bgl1 +2.1× vs control at 48h on Avicel. \n- xyr1 and cre1 expression increased 17.4× and 4.5× respectively in Tr-Ctcbh1; proposed mechanism: transient cellobiose accumulation from higher CBH1 activity acts as inducer to trigger broader cellulase gene induction.", "description": "Improved Production of Majority Cellulases in Trichoderma reesei by Integration of cbh1 Gene From Chaetomium thermophilum. Replaced the native T. reesei cbh1 gene with the cbh1 gene from the thermophilic fungus C. thermophilum at the cbh1 locus. C. thermophilum CBH1 showed ~4.5× higher specific activity than T. reesei CBH1 across a wider temperature range. Surprisingly, the cbh1 replacement not only increased cellobiohydrolase activity but also triggered upregulation of other cellulase genes via increased xyr1 expression, leading to broad improvements across the entire cellulase system."}, {"id": 59, "year": 2020, "title": "Application of the human estrogen receptor within a synthetic transcription factor in Trichoderma reesei", "doi": "https://doi.org/10.1186/s40694-020-00102-3", "species": "Trichoderma reesei", "strain": "TXYE", "target": "SynX (synthetic transcription factor); xylanases XYNI/XYNII and aldose reductase Xyl1 (reporter outputs)", "strategy": "Synthetic transcription factor engineering", "promoter": "tef1", "signal_peptide": "", "yield": "", "units": "", "key_results": "- SynX induced xyn1, xyn2, and xyl1 expression in a strict 17β-estradiol-dependent manner across all carbon sources tested (glucose, glycerol, xylan, lactose) with zero basal activity in the absence of inducer. \n- Xylanolytic activity reached up to 3706 U/g on xylan at 300 nM 17β-estradiol. \n- Cellulase expression was not meaningfully induced by SynX, distinguishing it from the prior fusion TF XY1. \n- The hERα LBD-enforced homodimerization is proposed to preferentially drive binding to inverted repeats in xylanase promoters over direct repeats in cellulase promoters.", "description": "Application of the human estrogen receptor within a synthetic transcription factor in T. reesei. Engineered T. reesei to enable controllable, inducer-dependent gene expression by constructing a synthetic transcription factor (SynX) fusing the DNA-binding domain of Xyr1, the transactivation domain of Ypr1, and the ligand-binding domain of the human estrogen receptor α (hERα), codon-optimized for T. reesei. Inserted a single-copy SynX cassette under the constitutive tef1 promoter at the pyr4 locus of an Xyr1-deficient recipient strain. Successfully regulated xylanase (xyn1, xyn2) and aldose reductase (xyl1) expression in strict dependence on 17β-estradiol across all carbon sources, with no detectable basal activity. Best result: Tight, carbon source-independent xylanase induction reaching up to 3706 U/g on xylan at 300 nM 17β-estradiol; cellulase expression was not induced, demonstrating that the hERα LBD selectively biases SynX toward xylanase promoter architecture."}, {"id": 60, "year": 2020, "title": "Engineering the Effector Domain of the Artificial Transcription Factor to Improve Cellulase Production by Trichoderma reesei", "doi": "https://doi.org/10.3389/fbioe.2020.00675", "species": "Trichoderma reesei", "strain": "QS2", "target": "Native cellulase complex (CBH, EG, BGL)", "strategy": "Transcription factor engineering — artificial zinc finger protein (AZFP) with endogenous Xyr1 activation domain replacing exogenous Gal4 activation domain", "promoter": "xyn3", "signal_peptide": "", "yield": "", "units": "", "key_results": "- QS2 FPase activity reached 2.4 IU/mL at day 5 — 24.2% higher than QS1 and 73.7% higher than TU-6. \n- CMCase improved 50.4% and 132.4% vs. QS1 and TU-6 respectively. \n- pNPCase increased 25.8% vs. QS1. \n- Extracellular protein 21.5% higher than QS1. \n- Major cellulase genes (cbh1, cbh2, egl1, egl2, bgl1) upregulated 2.3–3.2× vs. QS1 at 24h; xyr1 and ace3 also significantly upregulated. \n- QS2 crude enzyme achieved 86.9% cellulose conversion of pretreated corn stover vs. 47.3% (QS1) and 43.9% (TU-6) at same protein loading. \n- Demonstrates that endogenous Xyr1AD outperforms exogenous Gal4AD in AZFP-based cellulase engineering.\n\n", "description": "Engineering the Effector Domain of the Artificial Transcription Factor to Improve Cellulase Production by Trichoderma reesei. Replaced the exogenous yeast Gal4 activation domain (AD) in a previously identified artificial zinc finger protein (AZFPM2) with the endogenous Xyr1 activation domain (including the middle homology region) to generate AZFPM2-Xyr1AD, integrated at the xyn3 locus in T. reesei TU-6 to give strain QS2. A parallel control strain QS1 carried the original Gal4AD at the same locus. Best result: QS2 achieved 2.4 IU/mL FPase (24.2% and 73.7% higher than QS1 and TU-6 respectively), with major cellulase genes upregulated 2.3–3.2× over QS1 at 24h, and 86.9% cellulose conversion of pretreated corn stover vs. 47.3% for QS1 at the same enzyme loading — demonstrating that endogenous effector domains outperform heterologous ones in AZFP-based transcription factor engineering for cellulase production."}, {"id": 61, "year": 2021, "title": "Heterologous expression of Phanerochaete chrysosporium cellobiose dehydrogenase in Trichoderma reesei", "doi": "https://doi.org/10.1186/s12934-020-01492-0", "species": "Trichoderma reesei", "strain": "Δxyr1", "target": "PcCDH\n(Phanerochaete chrysosporium)", "strategy": "Heterologous expression", "promoter": "cDNA1", "signal_peptide": "PcCDH", "yield": "", "units": "", "key_results": "- PcCDH: successfully secreted at 610 U/L in 4 days using glucose medium. \n- Specific activity (12.7 U/mg), pH optima, catalytic constants, and redox potential were all closely comparable to native PcCDH. \n- FAD occupancy was 70%, higher than P. pastoris-expressed CDH (~30%). \n- Glycosylation was minimal and uniform (single GlcNAc at all 6 sites) due to endogenous Endo T activity, giving better homogeneity than P. pastoris (hyperglycosylated).\n-  Production was faster and yield higher than homologous P. chrysosporium expression", "description": "Heterologous expression of P. chrysosporium cellobiose dehydrogenase. in T. reesei Used T. reesei Δxyr1 strain with constitutive cDNA1 promoter to produce PcCDH from P. chrysosporium in glucose medium. Achieved 610 U/L in 4 days — comparable speed to P. pastoris but with a simpler medium. Endogenous Endo T activity produced minimal, uniform glycosylation (single GlcNAc at all 6 N-glycosylation sites), giving better homogeneity than P. pastoris. Specific activity, kinetics, and redox potential closely matched native PcCDH."}, {"id": 62, "year": 2021, "title": "Dissecting Cellular Function and Distribution of β-Glucosidases in Trichoderma reesei", "doi": "https://doi.org/10.1128/mBio.03671-20", "species": "Trichoderma reesei", "strain": "RUT-C30", "target": "CEL3B, CEL3E, CEL3F, CEL3H, CEL3J, CEL1A, CEL3C, CEL1B, CEL3G, CEL3D (β-glucosidases)", "strategy": "Systematic overexpression + fluorescence localization + secretion pathway analysis", "promoter": "Modified cbh1", "signal_peptide": "native", "yield": "", "units": "", "key_results": "- CEL3B and CEL3G overexpression increased extracellular β-glucosidase activity by 2.33× and 1.08× respectively; CEL1B overexpression nearly abolished all cellulase production and cell growth on cellulose. \n- Four cellular distribution patterns identified: secretion vesicles in cytoplasm (CEL3B, CEL3E, CEL3F, CEL3G); reticular endomembrane/cell membrane network (CEL3H, CEL3J); vacuoles (CEL1A, CEL3D); nucleus (CEL3C). - CEL3B, CEL3E, CEL3F, CEL3H, CEL3G secreted via tip-directed classical ER-Golgi pathway; CEL1A via vacuole-mediated conventional pathway without signal peptide; CEL3J via unconventional BFA-insensitive Golgi-bypassing pathway. \n- CEL3C confirmed as nuclear protein by DAPI co-staining and NLS sequence prediction. \n- Overexpression of all tested BGLs delayed endoglucanase production except CEL1A, CEL1B, and CEL3D.", "description": "Dissecting Cellular Function and Distribution of β-Glucosidases in Trichoderma reesei. Systematically overexpressed all 10 poorly characterized β-glucosidases (CEL3B, CEL3E, CEL3F, CEL3H, CEL3J, CEL1A, CEL3C, CEL1B, CEL3G, CEL3D) as DsRed fusions in T. reesei RUT-C30 to map their cellular localization, secretion pathways, and impact on cellulase production. Overexpression of cel3b and cel3g significantly boosted extracellular β-glucosidase production, while overexpression of cel1b almost completely abolished cellulase production on cellulose. CEL3J was found to be secreted via an unconventional Golgi-bypassing pathway, and CEL3C was unexpectedly localized to the nucleus."}, {"id": 63, "year": 2021, "title": "Rational engineering of xylanase hyper-producing system in Trichoderma reesei for efficient biomass degradation", "doi": "https://doi.org/10.1186/s13068-021-01943-9", "species": "Trichoderma reesei", "strain": "C30OExyr1/xyn2Δcbh1", "target": "XYR1, XYNII", "strategy": "Transcription factor engineering + promoter engineering + gene overexpression + locus replacement", "promoter": "PgpdA , cbh1 ", "signal_peptide": "native", "yield": "", "units": "", "key_results": "- C30OExyr1/xyn2Δcbh1 achieved 5256 U/mL xylanase activity and 9.25 U/mL β-xylosidase activity on Avicel — 6.79-fold higher than RUT-C30. High xylanase production also achieved on soluble carbon sources: 3085 U/mL on lactose and 2310 U/mL on glucose, overcoming traditional xylan induction requirement. \n- cbh1 locus insertion outperformed random insertion due to higher transcription at this locus and relief of ER stress from CBHI deletion. Xylanase cocktail improved saccharification of alkali-pretreated corn stover by 34.64% at optimal X/F ratio of 500.", "description": "Rational engineering of xylanase hyper-producing system in T. reesei for efficient biomass degradation. Engineered T. reesei RUT-C30 by combining transcription factor manipulation and homologous overexpression of the major endo-xylanase XYNII to establish a xylanase hyper-producing platform. XYR1 was constitutively overexpressed under the PgpdA promoter via insertion into the ace1 locus (simultaneously disrupting ACE1), and XYNII was overexpressed under the cbh1 promoter at the cbh1 locus, replacing the dominant cellulase CBHI. Unexpectedly, ace1 deletion in an XYR1-overexpressing background reduced rather than enhanced xylanase output, attributed to disruption of the functional XYR1-ACE1 regulatory complex. Best result: Final strain C30OExyr1/xyn2Δcbh1 achieved 5256 U/mL xylanase activity on Avicel, and 2310–3085 U/mL on economical soluble carbon sources (glucose and lactose), with a 34.64% improvement in corn stover saccharification efficiency at optimal xylanase-to-cellulase ratio."}, {"id": 64, "year": 2021, "title": "Disruption of the Trichoderma reesei gul1 gene stimulates hyphal branching and reduces broth viscosity in cellulase production", "doi": "https://doi.org/10.1093/jimb/kuab012", "species": "Trichoderma reesei", "strain": "Δgul1", "target": "GUL1", "strategy": "Gene deletion + morphological engineering", "promoter": "N/A (deletion strain); Ppdc1 (OEgul1 overexpression construct)", "signal_peptide": "", "yield": "", "units": "", "key_results": "- Δgul1 showed hyper-branching morphology, smaller mycelial clumps, and ~40% lower broth viscosity than reference at 48h.\n- FPase activity at 168h was 3.38 U/mL, 22% higher than QPP. Total extracellular protein also increased. \n- OEgul1 showed opposite effect — higher viscosity and lower cellulase production. \n- Transcriptomics revealed differential expression of cell wall remodeling genes and hydrophobins; cellulase gene transcripts were paradoxically downregulated, suggesting the productivity improvement is post-transcriptional/morphology-driven.", "description": "Disruption of gul1 in T. reesei stimulates hyphal branching and improves cellulase production. Deleted gul1, encoding a putative mRNA-binding protein homologous to N. crassa GUL-1 and S. cerevisiae Ssd1, in QP4 via homologous recombination. The Δgul1 strain exhibited hyper-lateral branching, smaller mycelial clumps, and ~40% lower fermentation broth viscosity compared to the reference strain at 48h. FPase activity reached 3.38 U/mL at 168h, a 22% improvement, accompanied by increased total extracellular protein. Paradoxically, transcriptomics showed major cellulase genes and xyr1 were downregulated in Δgul1, indicating the productivity gain is driven by improved morphology and secretion capacity rather than increased transcription. A complementary OEgul1 overexpression strain confirmed the inverse relationship — higher viscosity and reduced cellulase output. First report of gul1 manipulation in an industrial fungus."}, {"id": 65, "year": 2021, "title": "Disruption of alpha-tubulin releases carbon catabolite repression and enhances enzyme production in Trichoderma reesei even in the presence of glucose", "doi": "https://doi.org/10.1186/s13068-021-01887-0", "species": "Trichoderma reesei", "strain": "ΔtubB", "target": "CBH1, EG1, XYNI", "strategy": "Gene disruption", "promoter": "pcbh1, peg1, pxyn1", "signal_peptide": "native", "yield": "", "units": "", "key_results": "- ΔtubB produced 3.5 U/mL FPase activity on glucose medium at 144h compared to 0 U/mL for parent PC-3-7.\n- Extracellular protein content reached 2.4 mg/mL on glucose, a level comparable to cellulose-induced cultures.\n- pcbh1, peg1, and pxyn1 transcript levels were significantly upregulated 4.7- to 12-fold in glucose compared to the parent.\n- Co-utilized glucose and cellobiose simultaneously, whereas the parent completely repressed cellobiose uptake.", "description": "Disruption of alpha-tubulin releases carbon catabolite repression and enhances enzyme production in Trichoderma reesei even in the presence of glucose (2021) An insertional knockout of the endogenous alpha-tubulin gene (tubB) in Trichoderma reesei alters the microtubule polymer network, triggering a complete bypass of carbon catabolite repression (CCR). When grown on high-glucose media, the resulting ΔtubB strain overexpresses native sugar transporters to achieve simultaneous co-utilization of glucose and cellobiose. This structural modification avoids typical high-glucose transcriptional repression, driving robust multi-fold upregulations of pcbh1, peg1, and pxyn1 transcripts to yield 2.4 mg/mL of secreted cellulolytic enzymes directly in glucose cultures."}, {"id": 66, "year": 2021, "title": "A Swollenin From Talaromyces leycettanus JCM12802 Enhances Cellulase Hydrolysis Toward Various Substrates", "doi": "https://doi.org/10.3389/fmicb.2021.658096", "species": "Trichoderma reesei", "strain": "AST1116", "target": "TlSWO", "strategy": "Heterologous expression", "promoter": "eno", "signal_peptide": "native", "yield": "", "units": "", "key_results": "- TlSWO successfully secreted from T. reesei. \n- Highest specific activity on lichenan (9.0 U/mg) and barley β-glucan (8.9 U/mg). \n- Disruptive activity on Avicel confirmed by SEM. \n- Synergistic effect with cellobiohydrolase Cel7A increased PASC conversion by ~32% and PCS conversion up to 72.2% at 120h.\n- No significant synergy with endoglucanases.", "description": "A Swollenin From Talaromyces leycettanus JCM12802 Enhances Cellulase Hydrolysis Toward Various Substrates. Expressed the swollenin TlSWO from Talaromyces leycettanus JCM12802 in T. reesei AST1116 using the eno promoter via the pTrEno vector. Expression was higher in T. reesei than in P. pastoris, so all characterization used T. reesei-derived protein. TlSWO has a three-domain structure (CBM1, Expansin_EG45, Expansin_CBD) and showed hydrolytic activity on lichenan, barley β-glucan, CMC-Na, and laminarin. It disrupted Avicel surface structure and exhibited strong synergy with cellobiohydrolase Cel7A, increasing PASC conversion by ~32% and PCS conversion up to 72.2%, but showed no significant synergy with endoglucanases."}, {"id": 67, "year": 2022, "title": "Characterization of Recombinant Antimicrobial Peptide BMGlv2 Heterologously Expressed in Trichoderma reesei", "doi": "https://doi.org/10.3390/ijms231810291", "species": "Trichoderma reesei", "strain": "Tu6 (ATCC MYA-256)", "target": "BMGlv2\n(Bombyx mandarina)", "strategy": "Heterologous expression", "promoter": "cbh1", "signal_peptide": "CBH1", "yield": "No production yield\n(54.5% recovery yield)\n", "units": "", "key_results": "- MIC = MBC for all three pathogens, indicating bactericidal (not just bacteriostatic) activity (the pathogens tested are common causes of piglet diarrhea)\n- MIC/MBC values: E. coli ATCC 25922 = 43.75 μg/mL; S. derby ATCC 13076 = 43.75 μg/mL; C. perfringens CVCC 2032 = 21.86 μg/mL.\n- BMGlv2: was successfully expressed and secreted in T. reesei Tu6 using the PCBHG vector (cbh1 promoter + CBH1 signal peptide), and the purified peptide retained full antimicrobial activity", "description": "Characterization of Recombinant Antimicrobial Peptide BMGlv2 in T. reesei. Expressed gloverin2 antimicrobial peptide from Bombyx mandarina in T. reesei Tu6 using the cbh1 promoter. Characterized the purified peptide's antimicrobial activity against three piglet diarrhea pathogens. MIC/MBC of 43.75 μg/mL against E. coli and S. derby, 21.86 μg/mL against C. perfringens. Thermostable and pepsin-resistant, with membrane disruption confirmed as mechanism of action."}, {"id": 68, "year": 2022, "title": "A multi-plex protein expression system for production of complex enzyme formulations in Trichoderma reesei", "doi": "https://doi.org/10.1093/jimb/kuac027", "species": "Trichoderma reesei", "strain": "AST1116", "target": "CBH1, EG1, BGL1, eGFP\n(native)", "strategy": "Multi-gene expression engineering + expression platform development", "promoter": "eno1", "signal_peptide": "native for all\n(eGFP is a reporter protein so N/A)", "yield": "", "units": "", "key_results": "- ~6.72 µg/100 µg total protein; highest expressed of the three cellulases; confirmed by immunoblot and pNP-L activity.\n- EG1: ~0.60 µg/100 µg total protein; functional activity confirmed on AZCL-HE-cellulose\n- BGL1: ~0.38 µg/100 µg total protein; confirmed by anti-His immunoblot and pNP-G activity.\n- Overall there was 18-fold expression drop from gene 1 (CBH1) to gene 3 (BGL1), attributed to translational attenuation over the long transcript rather than transcriptional differences. eGFP fluorescence reliably correlated with upstream cellulase expression.", "description": "A multi-plex protein expression system in T. reesei. developed a 4-gene multiplexed expression system using FMDV 2A-peptide ribosomal-skip mechanism under a single eno1 promoter. Successfully co-expressed CBH1, EG1, BGL1, and eGFP simultaneously. Observed 18-fold expression drop from gene 1 to gene 3, attributed to translational attenuation. eGFP fluorescence reliably screened for full-cassette integration."}, {"id": 69, "year": 2022, "title": "Identification of a Bidirectional Promoter from Trichoderma reesei and Its Application in Dual Gene Expression\n", "doi": "https://doi.org/10.3390/jof8101059", "species": "Trichoderma reesei", "strain": "OEypr1-Δsor1", "target": "eGFP + mCherry (reporter validation); ctCBHI (Chaetomium thermophilum) + EG1 (native T. reesei) for cellulase application", "strategy": "Bidirectional promoter engineering + dual gene co-expression", "promoter": "Psor", "signal_peptide": "native", "yield": "", "units": "", "key_results": "eGFP + mCherry: Psor simultaneously drove both reporter genes — each direction reached ~50–62% of PgpdA strength by qRT-PCR. ctCBHI + EG1: Co-expression under Psor enabled cellulase production on glucose (no cellulases detected in parental strain on glucose). On Avicel after 120h, cellobiohydrolase and endoglucanase activities increased by 37% and 17% respectively vs. parental strain. ctCBHI and EG1 confirmed in supernatant by SDS-PAGE and LC-MS/MS.", "description": "Identification of a Bidirectional Promoter from Trichoderma reesei and Its Application in Dual Gene Expression. Isolated and characterized the first functional bidirectional promoter (Psor) from a 767-bp intergenic sequence between two divergent polyketide synthase genes in Trichoderma reesei to enable simultaneous multi-gene co-expression. Validated its symmetric transcriptional strength using dual fluorescent reporters and tested its utility by co-expressing two distinct cellulases. Best result: Confirmed Psor possesses approximately half the driving strength of the strong reference PgpdA promoter in both directions, successfully driving balanced dual-cellulase expression to achieve active cellulase synthesis on glucose and enhanced cellulose saccharification."}, {"id": 70, "year": 2022, "title": "Genetic engineering and raising temperature enhance recombinant protein production with the cdna1 promoter in Trichoderma reesei\n", "doi": "https://doi.org/10.1186/s40643-022-00607-2", "species": "Trichoderma reesei", "strain": "QP4", "target": "beta-mannanase (PoMan5A from Penicillium oxalicum) and Endopolygalacturonase (PoPga)", "strategy": "Promoter core engineering / Chimeric 5′-UTR replacement / Multi-copy integration", "promoter": "cdna1 promoter", "signal_peptide": "native", "yield": "199.85", "units": "U/mL", "key_results": "- Triplicating the critical -700 to -600 bp activation region (PcMC promoter) increased single-copy beta-mannanase expression by 37.4%. \n- Replacing the native cdna1 5′-UTR with the cel5A 5′-UTR boosted yields by an additional 35%.\n- Environmental screening revealed that the cdna1 promoter is heat-inducible; shifting fermentation temperature from 30 C to 37 C drastically enhanced transcription velocities and protein secretion. \n- Combining the engineered PcMC promoter, random multi-copy genomic integration, and a 37 C fermentation shift generated a peak beta-mannanase titer of 199.85 U/mL in shake flasks, representing a 6.6-fold increase over the unoptimized baseline strain.", "description": "Genetic engineering and raising temperature enhance recombinant protein production with the cdna1 promoter in Trichoderma reesei. Engineered Trichoderma reesei QP4 to maximize constitutive target enzyme synthesis using the glucose-active cdna1 promoter. Identified a critical 100-bp activation region (-700 to -600 bp upstream) and engineered a synthetic promoter containing three tandem copies of this core sequence. Best result: Combining the multi-core promoter matrix with a cel5A 5′-UTR swap, multi-copy genomic integration, and a fermentation temperature shift to 37 C (exploiting the promoter's natural heat-inducibility) drove a 6.6-fold spike in extracellular $\\beta$-mannanase activity, reaching 199.85 U/mL in shake flasks."}, {"id": 71, "year": 2022, "title": "Constitutive overexpression of cellobiohydrolase 2 in Trichoderma reesei reveals its ability to initiate cellulose degradation\n", "doi": "https://doi.org/10.1016/j.engmic.2022.100059", "species": "Trichoderma reesei", "strain": "QM9414", "target": "cbh2", "strategy": "Promoter engineering", "promoter": "gpd1, rpS30", "signal_peptide": "native", "yield": "", "units": "", "key_results": "- Swapping inducible switches for constitutive Pgpd1 and PrpS30 promoters yielded up to a 3687-fold and 1868-fold increase in cbh2 transcript abundance on glucose. \n- During early-stage growth on cellulose (29 h), constitutive CBH2 synthesis accelerated crystalline polymer breakdown, cutting remaining substrate volumes in half relative to parental controls. \n- This early attack drove robust transcriptional induction of main core cellulase genes (cbh1, eg1, eg2), with scanning electron microscopy (SEM) confirming significant surface damage, groove erosion, and structural smoothing on crystalline Avicel matrices.", "description": "Constitutive overexpression of cellobiohydrolase 2 in Trichoderma reesei reveals its ability to initiate cellulose degradation. Engineered Trichoderma reesei QM9414 using promoter engineering (constitutive expression on glucose) by swapping the native inducible locus of cbh2 with constitutive gpd1 or rpS30 transcriptional promoters. Best result: Constitutive cell surface accumulation of CBH2 systematically derepressed nutrient-sensing cascades on glucose, driving strong autonomous expression of major downstream core cellulase cascades (cbh1, eg1, eg2) to rapidly initiate macro-cellulose matrix degradation within a 29-hour cultivation window."}, {"id": 72, "year": 2022, "title": "Elimination of the Sugar Transporter GAT1 Increased Xylanase I Production in Trichoderma reesei", "doi": "https://doi.org/10.3389/fmicb.2022.810066", "species": "Trichoderma reesei", "strain": "QM9414–Δpyr4", "target": "xyn1", "strategy": "gene deletion", "promoter": "xyn1", "signal_peptide": "native", "yield": "", "units": "", "key_results": "- Deletion of gat1 increased total xylanase activity by ~38%, increased xyn1 transcription up to 4-fold, and substantially increased extracellular XYNI production while having minimal effect on XYNII or cellulase production. \n- Transcriptomics identified 255 differentially expressed genes.", "description": "Elimination of the Sugar Transporter GAT1 Increased Xylanase I Production in Trichoderma reesei. Identified the sugar transporter GAT1 as a previously unknown negative regulator of xylanase production in T. reesei. Deletion of gat1 increased extracellular xylanase activity by ~38% and elevated xyn1 transcription up to 4-fold, while having little effect on cellulase production. Transcriptome analysis revealed widespread regulatory changes and demonstrated that GAT1 specifically represses xylanase expression rather than acting as a general cellulase regulator. Complementation restored the wild-type phenotype, confirming GAT1's regulatory role. Establishes transporter engineering as a novel strategy for improving enzyme production in Trichoderma by manipulating nutrient-sensing and regulatory pathways rather than directly modifying promoters or expression cassettes."}, {"id": 73, "year": 2022, "title": "Simultaneous manipulation of multiple genes within a same regulatory stage for iterative evolution of Trichoderma reesei", "doi": "https://doi.org/10.1186/s13068-022-02122-0", "species": "Trichoderma reesei", "strain": "SUS4", "target": "endoglucanase (native)", "strategy": "Semi-rational multi-gene engineering + RNAi engineering + strain evolution", "promoter": "cbh1, pdc1, gpd1, cDNA1, xpp1, pki1, tef1", "signal_peptide": "Native", "yield": "", "units": "", "key_results": "- Endoglucanase: Stage 1 (transcription) — best transformant 1–2 reached 32.3 U/mL (2.4× parental SUS4 at 13.5 U/mL); xyr1 present in all five representative transformants. \n- Stage 2 (secretion/ERAD silencing) — best transformant 2–3 reached 46.2 U/mL; ymr1 silenced in 4/5 representative transformants. \n- Stage 3 (cell metabolism) — best transformant 3–8 reached 57.5 U/mL (4.35× SUS4); 6-phosphogluconate dehydrogenase gene 72685 enriched in all five Stage 3 transformants. \n- Total improvement 4.35-fold in cellulase activity and 2.97-fold in extracellular protein concentration over parental SUS4.", "description": "Simultaneous manipulation of multiple genes within a same regulatory stage for iterative evolution of T. reesei. Divided cellulase production into three regulatory stages (transcription, secretion/ERAD, cell metabolism) and co-transformed pools of candidate genes targeting each stage simultaneously. Used FACS screening via surface-displayed DsRed under the cbh1 promoter to rapidly identify hyperproducers, with the best transformant from each round used as the recipient for the next. Best result: After three iterative rounds, top strain 3-8 reached 57.5 U/mL endoglucanase — a 4.35× improvement over parental SUS4 — with xyr1 enriched at stage 1, ymr1 silencing at stage 2, and 6-phosphogluconate dehydrogenase gene 72685 at stage 3 as the key hits."}, {"id": 74, "year": 2022, "title": "Toward more efficient ergothioneine production using the fungal ergothioneine biosynthetic pathway", "doi": "https://doi.org/10.1186/s12934-022-01807-3", "species": "Trichoderma reesei", "strain": "QM9414", "target": "TrEgt1, TrEgt2", "strategy": "Heterologous expression + metabolic pathway characterization", "promoter": "", "signal_peptide": "", "yield": "", "units": "", "key_results": "- T. reesei QM9414 natively produces ERG in conidia and mycelia, confirmed by HPLC and LC-MS.\n- Co-expression of tregt1 + tregt2 in E. coli produced 70.59 mg/L ERG after 48h whole-cell biocatalysis; tregt1 alone gave minor ERG; tregt2 alone gave none.\n- Fed-batch fermentation reached 4.34 g/L extracellular ERG at 143h — highest reported at time of publication.\n- N. crassa egt1/egt2 strain achieved 4.22 g/L under identical conditions.\n- Fungal two-enzyme pathway (l-Cys as sulfur donor) more efficient than the five-gene bacterial M. smegmatis pathway.", "description": "Toward more efficient ergothioneine production using the fungal ergothioneine biosynthetic pathway. Confirmed that T. reesei QM9414 natively synthesizes ergothioneine (ERG) in both conidia and mycelia. Cloned two ERG biosynthesis genes (tregt1 and tregt2) from T. reesei cDNA and heterologously expressed them in E. coli BW25113 under the araBAD promoter. Co-expression of tregt1 + tregt2 produced 70.59 mg/L ERG after 48h whole-cell biocatalysis, with Tregt1 identified as the key enzyme. Fed-batch fermentation with continuous amino acid precursor feeding (l-histidine, l-methionine, l-cysteine) reached 4.34 g/L extracellular ERG at 143h — the highest reported titer at the time. Parallel experiments with N. crassa egt1/egt2 achieved 4.22 g/L under identical conditions, confirming the fungal two-enzyme pathway as broadly effective and more efficient than the five-gene bacterial M. smegmatis pathway."}, {"id": 75, "year": 2022, "title": "Sorbicillinoids hyperproduction without affecting the cellulosic enzyme production in Trichoderma reesei JNTR5", "doi": "https://doi.org/10.1186/s13068-022-02183-1", "species": "Trichoderma reesei", "strain": "JNTR5", "target": "Tr69957 (MFS sugar transporter)", "strategy": "Overexpression + insertional mutagenesis", "promoter": "cbh1", "signal_peptide": "", "yield": "", "units": "", "key_results": "- Tr69957 overexpression caused constitutive upregulation of all 8 sorbicillinoid biosynthetic gene cluster members (sor1, sor2, sor3, sor4, sor6, ypr1, ypr2) via off-target chromosomal remodeling, producing 6.8× more sorbicillinoids than RUT-C30 on cellulose (OD370 = 7.6) and 13.7× on cellobiose. \n- Cellulase/hemicellulase activities remained comparable to RUT-C30 despite transcriptional downregulation of most cellulase genes, attributed to compromised cell wall integrity enhancing passive enzyme secretion. \n- Hyperproduction was constitutive and independent of carbon source and light.", "description": "Sorbicillinoids hyperproduction without affecting the cellulosic enzyme production in T. reesei JNTR5. Engineered T. reesei RUT-C30 by overexpressing the MFS sugar transporter Tr69957 under the cbh1 promoter via Agrobacterium-mediated transformation. A random off-target genomic insertion in the resulting mutant JNTR5 caused chromosomal remodeling that constitutively activated all 8 genes of the sorbicillinoid biosynthetic gene cluster, driving hyperproduction of sorbicillinoids independently of carbon source or light. Cellulase and hemicellulase activities remained comparable to RUT-C30 despite transcriptional downregulation of most cellulase genes, explained by compromised cell wall integrity enhancing passive secretion. Best result: 6.8-fold higher sorbicillinoid production than RUT-C30 on cellulose (OD370 = 7.6) and highest yield on cellobiose (OD370 = 13.7), establishing JNTR5 as the first T. reesei platform for simultaneous sorbicillinoid and cellulase co-production."}, {"id": 76, "year": 2022, "title": "Discovery of ER-localized sugar transporters for cellulase production with lac1 being essential", "doi": "https://doi.org/10.1186/s13068-022-02230-x", "species": "Trichoderma reesei", "strain": "ΔLAC1", "target": "LAC1, MFS, GST", "strategy": "Gene deletion + transcriptomics", "promoter": "Native (deletion strains); cbh1 (LAC1-DsRed-OE localization construct)", "signal_peptide": "", "yield": "", "units": "", "key_results": "- Deletion of mfs, gst, and lac1 each reduced cellulase production; ΔLAC1 almost abolished it entirely. \n- All three transporters localized to ER, not cell membrane. \n- LAC1 deletion impaired biomass formation on all tested sugars regardless of type. \n- Transcriptomics of ΔLAC1 showed downregulation of protein glycosylation, lipid biosynthesis, and cellulase genes at 24h, with transcription recovering by 72h but cellulase production remaining inhibited — indicating post-transcriptional regulation independent of XYR1 and CRT1.", "description": "Discovery of ER-localized sugar transporters for cellulase production in T. reesei, with lac1 being essential. Identified three MFS sugar transporters (MFS, GST, LAC1) upregulated on cellulose vs. glucose via transcriptomics in Rut-C30. Individual gene deletions in Ku70 confirmed all three positively contribute to cellulase production, with ΔLAC1 nearly abolishing it entirely. Unexpectedly, all three transporters were found to localize in the ER rather than the cell membrane, confirmed by DsRed tagging and ER-tracker co-localization. Sugar transport function in yeast was very weak, suggesting a role in intracellular sugar sensing or utilization rather than cellular uptake. LAC1 deletion impaired biomass formation on all carbon sources and downregulated protein glycosylation and lipid biosynthesis genes; cellulase transcription recovered after 72h but enzyme production did not, establishing a post-transcriptional regulatory role for LAC1 independent of the XYR1-CRT1 pathway."}, {"id": 77, "year": 2023, "title": "Inducer-free recombinant protein production in Trichoderma reesei: secretory production of endogenous enzymes and heterologous nanobodies using glucose as the sole carbon source", "doi": "https://doi.org/10.1186/s12934-023-02109-y", "species": "Trichoderma reesei", "strain": "E1AB1-XA3", "target": "PEP1 (native), GLA1 (native), 1ZVH (anti-lysozyme nanobody), Caplacizumab (anti-vWF nanobody), Ozoralizumab (anti-TNFα/HSA nanobody)\n\n", "strategy": "Promoter engineering + secretion engineering + heterologous expression", "promoter": "cbh1", "signal_peptide": "CBH2", "yield": "Caplacizumab- 508 mg/L", "units": "mg/L", "key_results": "- PEP1 and GLA1: produced succesfully secreted and showed overexpression\n- 1ZVH: production increased 3.85× using CBH2 signal + CBD carrier + KEX2 linker (SCK strategy) compared with signal peptide alone\n- Ozoralizumab: production increased 1.79× with SCK strategy; protease inhibitors increased production 3.38×. Final yield exceeded 400mg/L\n- Caplacizumab: SCK construct gave 3.14× improvement over signal peptide alone. Protease inhibitors added 1.85× further increase by reducing linker degradation. Double cbh1+cbh2 replacement + SCK + protease inhibitors achieved 508 mg/L, a 9.49-fold improvement over the baseline.", "description": "Inducer-free recombinant protein production in T. reesei. Engineered T. reesei to produce proteins using glucose as the sole carbon source by combining mutated transcriptional activators (XYR1^V821F^ and truncated ACE3) with deletions of repressors ace1 and rce1. Replaced the cbh1/cbh2 loci with target genes. Successfully produced endogenous enzymes (PEP1, GLA1) and three nanobodies (1ZVH, caplacizumab, ozoralizumab) without any inducer. Best result: 508 mg/L caplacizumab with double locus replacement + CBD carrier + protease inhibitors."}, {"id": 78, "year": 2023, "title": "Combining manipulation of integration loci and secretory pathway on expression of an Aspergillus niger glucose oxidase gene in Trichoderma reesei", "doi": "https://doi.org/10.1186/s12934-023-02046-w", "species": "Trichoderma reesei", "strain": "QM9414", "target": "AnGOx\n(Aspergillus niger)", "strategy": "Integration site engineering + secretory pathway engineering", "promoter": "cbh1", "signal_peptide": "native", "yield": "", "units": "", "key_results": "- AnGOx: cel3c-integrated strain produced 309 U/mL vs. 126 U/mL for cbh1-integrated — a 2.5× improvement from locus alone.\n- cel3c integration drove 5× higher AnGOx transcription at 24h post-induction, and upregulated secretory pathway genes snc1 and rho3 endogenously (1.9× and 2.6× at 48h).\n- Overexpressing snc1, sso2, or rho3 further improved expression in the cbh1-integrated strain (up to 185 U/mL for sso2) but had no effect in the cel3c strain — suggesting cel3c integration already maximally activates the secretory pathway.\n- Dual integration in both loci simultaneously did not improve yield beyond cel3c alone (160 U/mL).", "description": "Combining manipulation of integration loci and secretory pathway for AnGOx expression. Identified cel3c as a superior integration locus for AnGOx (A. niger) expression compared to the conventional cbh1 locus — achieved 309 U/mL vs 126 U/mL. cel3c integration coincidentally upregulated secretory pathway genes snc1 and rho3, rewiring cellular secretion capacity. Overexpressing snc1/sso2/rho3 further improved cbh1-integrated strain but had no effect on cel3c strain, suggesting cel3c already maximally activates the secretory pathway."}, {"id": 79, "year": 2023, "title": "Enhancing the production of a heterologous Trametes laccase (LacA) by replacement of the major cellulase CBH1 in Trichoderma reesei", "doi": "https://doi.org/10.1093/jimb/kuad002", "species": "Trichoderma reesei", "strain": "TU-6", "target": "LacA \n(Trametes sp. AH28-2 laccase)", "strategy": "Host engineering (CBH1 replacement) + heterologous expression", "promoter": "cbh1", "signal_peptide": "CBH1", "yield": "", "units": "", "key_results": "- Random integration yielded no detectable LacA secretion.\n- cbh1 locus replacement enabled LacA production and reached 168.3 U/L laccase activity while alleviating ER stress and ERAD activation.", "description": "Enhancing the production of LacA by replacement of CBH1 in T. reesei. Attempted to express the high-redox potential laccase LacA from Trametes sp. AH28-2 in T. reesei using the cbh1 promoter. Random integration failed — lacA was transcribed but not secreted due to strong ERAD activation causing intracellular degradation. Replacing the cbh1 locus with the lacA expression cassette via homologous recombination solved this — deleting CBH1 (which accounts for ~60% of secreted protein) relieved ER secretory pressure, allowing LacA to be secreted. Yield optimized from 51.0 U/L (2% lactose) to 168.3 U/L (4% lactose)."}, {"id": 80, "year": 2023, "title": "Fused expression of Sm1-Chit42 proteins for synergistic mycoparasitic response of Trichoderma afroharzianum on Botrytis cinerea\n", "doi": "https://doi.org/10.1186/s12934-023-02151-w", "species": "Trichoderma afroharzianum", "strain": "OE:SCf", "target": "Sm1-Chit42 fusion protein (Elicitor Sm1 fused with a 42-kDa endochitinase)", "strategy": "Fused expression / Chimeric protein engineering", "promoter": "trpC", "signal_peptide": "native", "yield": "", "units": "", "key_results": "- The flexible-linker fusion strain (OE:SCf) yielded a significant 58.36% increase in extracellular chitinase activity (17.34 U/ml) compared to wild-type (10.95 U/ml).\n- Secreted SCf successfully bound to hydrophobic surfaces (PET), modulating surface roughness and shifting the water contact angle to 87° to facilitate pathogen adhesion.\n- FITC-labeling confirmed that the chimeric protein achieves significantly higher, more uniform physical binding to B. cinerea hyphae than the standard Chit42 protein.\n- OE:SCf triggered a strong phenotypic mycoparasitic cascade against B. cinerea: enhanced chemotropism toward colloidal chitin, physical hyphal coiling, local ROS bursts, and the transcriptional down-regulation of pathogen cell wall synthesis genes (Bcchs1) and virulence genes.", "description": "Fused expression of Sm1-Chit42 proteins for synergistic mycoparasitic response of Trichoderma afroharzianum on Botrytis cinerea. Fused expression of Sm1-Chit42 proteins for synergistic mycoparasitic response of T. afroharzianum on B. cinerea. Engineered T. afroharzianum to enhance biological control efficiency against fungal pathogens by developing a dual-action chimeric fusion protein system. Replaced standalone enzyme functionality by linking the endochitinase (Metarhizium anisopliae MaChit42), which naturally lacks a carbohydrate-binding module, with an elicitor protein (Trichoderma afroharzianum TaSm1) to act as a functional binding domain. Successfully regulated the expression of the target chimeric protein (SCf) using a flexible-linker configuration under the trpC promoter, achieving a 58.36% increase in extracellular chitinase activity over wild-type. Best result: Enhanced chemotropism, robust physical hyphal coiling, localized ROS bursts, and direct uniform cell-wall binding that significantly down-regulated pathogen virulence and cell wall synthesis genes."}, {"id": 81, "year": 2023, "title": "High-level production of Aspergillus niger prolyl endopeptidase from agricultural residue and its application in beer brewing\n", "doi": "https://doi.org/10.1186/s12934-023-02087-1", "species": "Trichoderma reesei", "strain": "Tu6", "target": "rAN-PEP", "strategy": "Heterologous expression", "promoter": "cbh1", "signal_peptide": "cbh1", "yield": "", "units": "", "key_results": "- Screening of positive transformants on model cellulose (Avicel PH101) yielded 16.148 U/mL of extracellular prolyl endopeptidase activity. \n- Shifting the mycelium to a 5% corn cob inductive system doubled production, achieving a peak extracellular activity of 37.125 U/mL. \n- Purified rAN-PEP showed an acidic pH optimum of 4.0, a temperature optimum of 60°C, and excellent stability under typical brewing parameters (maintaining full activity below 20°C and 97% activity in 10% ethanol). \n- Application of crude or purified enzyme (2.5 mg/L or μg/mL) during brewing or cold maturation completely degraded gluten below the ELISA kit competitive limit of quantification (< 10 mg/kg), clearing beer turbidity and reducing total polyphenol haze-forming compounds.", "description": "High-level production of Aspergillus niger prolyl endopeptidase from agricultural residue and its application in beer brewing. Recombinantly expressed Aspergillus niger prolyl endopeptidase (rAN-PEP) in Trichoderma reesei TU6 under control of the cbh1 promoter and its native secretion signal. Co-cultivated the engineered strain on alternative low-cost agro-industrial wastes to reduce industrial production costs. Best result: Shifting fermentation from pure model cellulose to a 5% corn cob inductive residue matrix doubled extracellular enzyme titers, achieving a maximum yield of 37.125 U/mL. Treating malt wort with 2.5 μg/mL of the resulting enzyme efficiently degraded immunogenic celiac-triggering proteins, bringing total residual gluten levels below the technical detection limit (< 10 mg/kg) to successfully produce stable, low-haze gluten-free beer."}, {"id": 82, "year": 2023, "title": "Overexpression of the Transcription Factor Azf1 Reveals Novel Regulatory Functions and Impacts β-Glucosidase Production in Trichoderma reesei", "doi": "https://doi.org/10.3390/jof9121173", "species": "Trichoderma reesei", "strain": "OEazf1", "target": "Cel1a, Cel1b, Cel3g", "strategy": "Transcription factor engineering — overexpression of Azf1", "promoter": "Pcdna1", "signal_peptide"
