<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StrainX Bioworks — Protein Production Engineering Database</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f4f0;color:#1a1a1a;font-size:15px;line-height:1.6}
  header{background:#1a2e4a;color:#fff;padding:1.5rem 2rem;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.25)}
  header h1{font-size:1.3rem;font-weight:600;letter-spacing:-.01em}
  header p{font-size:.85rem;opacity:.72;margin-top:2px}
  .controls{background:#fff;border-bottom:1px solid #e0ddd5;padding:1rem 2rem;display:flex;gap:.75rem;flex-wrap:wrap;align-items:center;position:sticky;top:72px;z-index:99}
  .search-wrap{flex:1;min-width:220px}
  input[type=text]{width:100%;padding:8px 12px;font-size:14px;border:1px solid #ccc;border-radius:8px;background:#fafaf8;outline:none;transition:border-color .15s}
  input[type=text]:focus{border-color:#1a2e4a;box-shadow:0 0 0 3px rgba(26,46,74,.1)}
  select{padding:8px 10px;font-size:13px;border:1px solid #ccc;border-radius:8px;background:#fafaf8;color:#1a1a1a;cursor:pointer;outline:none}
  select:focus{border-color:#1a2e4a}
  .stats{font-size:12px;color:#666;white-space:nowrap;align-self:center}
  main{max-width:980px;margin:0 auto;padding:1.5rem}
  .cards{display:flex;flex-direction:column;gap:10px}
  .card{background:#fff;border:1px solid #e0ddd5;border-radius:12px;overflow:hidden;cursor:pointer;transition:box-shadow .15s,border-color .15s}
  .card:hover{box-shadow:0 2px 12px rgba(0,0,0,.08);border-color:#bbb}
  .card-top{padding:1rem 1.25rem}
  .card-header{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
  .card-title{font-size:14.5px;font-weight:600;color:#1a2e4a;flex:1;line-height:1.4}
  .card-year{font-size:12px;font-weight:600;background:#e8edf5;color:#1a2e4a;padding:3px 9px;border-radius:20px;white-space:nowrap;flex-shrink:0}
  .card-meta{display:flex;gap:6px;flex-wrap:wrap;margin-top:7px}
  .tag{font-size:11px;padding:2px 8px;border-radius:20px;white-space:nowrap;font-weight:500}
  .tag-strat{background:#f0ece2;color:#5a4a20}
  .tag-sp{background:#e8eef5;color:#1a3a5c}
  .tag-target{background:#edf5ee;color:#1a4a22}
  .yield-badge{font-size:12px;color:#1a6a3a;font-weight:600;margin-top:5px;display:flex;align-items:center;gap:4px}
  .card-body{padding:0 1.25rem 1.25rem;display:none;border-top:1px solid #f0ede6}
  .card.open .card-body{display:block}
  .card-body p{font-size:13.5px;color:#333;line-height:1.65;margin-top:.85rem}
  .section-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#888;margin-top:1rem;margin-bottom:3px}
  .results-text{font-size:13px;color:#444;line-height:1.6}
  .meta-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px 16px;margin-top:1rem}
  .meta-item{font-size:12px}
  .meta-item span:first-child{color:#888;font-weight:600;text-transform:uppercase;font-size:10.5px;letter-spacing:.05em;display:block}
  .meta-item span:last-child{color:#333}
  .doi-link{display:inline-flex;align-items:center;gap:4px;font-size:12px;color:#1a2e4a;text-decoration:none;margin-top:.85rem;font-weight:500;padding:5px 10px;background:#e8edf5;border-radius:6px}
  .doi-link:hover{background:#d4dff0}
  .no-results{text-align:center;padding:4rem 0;color:#888;font-size:14px}
  .chevron{width:16px;height:16px;flex-shrink:0;transition:transform .2s;opacity:.4;margin-top:2px}
  .card.open .chevron{transform:rotate(180deg)}
  @media(max-width:600px){
    .controls{top:60px;padding:.75rem 1rem;gap:.5rem}
    main{padding:1rem}
    .meta-grid{grid-template-columns:1fr}
  }
</style>
</head>
<body>
<header>
  <h1>StrainX Bioworks — Protein Production Engineering Database</h1>
  <p>100 papers on recombinant protein & metabolite production in Trichoderma, 1995–2026</p>
</header>
<div class="controls">
  <div class="search-wrap">
    <input type="text" id="search" placeholder="Search proteins, strategies, promoters, species…" oninput="render()">
  </div>
  <select id="fStrat" onchange="render()"><option value="">All strategies</option></select>
  <select id="fSp" onchange="render()"><option value="">All species</option></select>
  <select id="fYear" onchange="render()"><option value="">All years</option></select>
  <span class="stats" id="stats"></span>
</div>
<main>
  <div class="cards" id="cards"></div>
</main>
<script>
const DATA = [{"id": 0, "year": 1995, "title": "Production of Trichoderma reesei cellulases on glucose-containing media.\n", "doi": "https://doi.org/10.1128/aem.61.10.3650-3655.1995", "species": "Trichoderma reesei", "strain": "QM9414", "target": "CBH1 (native), EG1 catalytic core domain (native, CBM-deleted)", "strategy": "Promoter engineering (constitutive expression on glucose)", "promoter": "cDNA1, tef1", "signal_peptide": "native", "yield": "CBH1: 53 (shake-flask); EG1 core: 53 (shake-flask), 100 (fermentor)", "units": "mg/L", "key_results": "- CBH1: 7–53 mg/L shake flask (16–66% total secreted protein) under cDNA1 promoter. \n- EG1 core: 13–53 mg/L shake flask (26–76% total secreted protein); 100 mg/L at 96h in 15L fermentor (18–43% total secreted protein). \n- cDNA1 promoter gave 10–50× higher yields than tef1 (tef1 gave only ~2 mg/L EG1 core). \n- No endogenous CBH1 or EG1 detected in untransformed QM9414 on glucose, confirming tight glucose repression of native cellulase genes.", "description": "Production of Trichoderma reesei cellulases on glucose-containing media. Investigated the expression of cellobiohydrolase I (CBHI) and endoglucanase I (EGI) catalytic core domains under glucose-active constitutive promoters to bypass native glucose repression. Evaluated the elongation factor 1 alpha (tef1) promoter alongside an unidentified gene promoter (cdna1). Best result: The cdna1 promoter significantly outperformed tef1 by 20- to 50-fold, driving successful production and secretion of 50 to 100 mg/L of active cellulase core domains directly on glucose, where recombinant products accounted for over half of the total secreted proteins."}, {"id": 1, "year": 1995, "title": "A novel endo-beta-1,3-glucanase, BGN13.1, involved in the mycoparasitism of Trichoderma harzianum.", "doi": "https://doi.org/10.1128/jb.177.23.6937-6945.1995", "species": "Trichoderma harzianum", "strain": "CECT 2413", "target": "BGN13.1 (endo-β-1,3-glucanase)", "strategy": "Native enzyme purification and characterization + gene cloning", "promoter": "native", "signal_peptide": "native", "yield": "", "units": "", "key_results": "- BGN13.1 purified to homogeneity; 66 kDa by SDS-PAGE, predicted 77.9 kDa; endolytic, β-1,3-specific, non-glycosylated; Km = 3.3 mg/mL, Vmax = 75 µmol/min·mg; temperature optimum 40°C. \n- Alone cannot lyse fungal cell walls; synergistic lysis and pathogen inhibition observed when combined with T. harzianum β-1,6-glucanases and chitinases. \n- Represents a novel β-1,3-glucanase class with no homology to bacterial, yeast, or plant counterparts; unique cysteine-rich C-terminal domain proposed to mediate cell wall binding.", "description": "A Novel Endo-β-1,3-Glucanase, BGN13.1, Involved in the Mycoparasitism of Trichoderma harzianum. Purified and characterized BGN13.1, the major extracellular endo-β-1,3-glucanase from T. harzianum CECT 2413, and cloned its corresponding cDNA. BGN13.1 is specifically induced under simulated mycoparasitic conditions (autoclaved fungal mycelia/yeast cells) and repressed by glucose. The enzyme alone cannot lyse fungal cell walls but acts synergistically with T. harzianum chitinases and β-1,6-glucanases to inhibit phytopathogenic fungi. BGN13.1 represents a novel class of β-1,3-glucanase with a unique cysteine-rich C-terminal domain proposed to mediate cell wall binding during mycoparasitism."}, {"id": 2, "year": 1996, "title": "Improved production of Trichoderma harzianum endochitinase by expression in Trichoderma reesei.", "doi": "https://doi.org/10.1128/aem.62.6.2145-2151.1996", "species": "Trichoderma reesei", "strain": "RutC-30", "target": "ThEn-42\n(Trichoderma harzianum)", "strategy": "Heterologous expression", "promoter": "cbh1", "signal_peptide": "native and CBH1 tested\n(no difference)", "yield": "130", "units": "mg/L", "key_results": "- ThEn-42: 130 mg/L at 108h in shake-flask — >20× higher activity than native T. harzianum P1.\n- Native prepro and CBH1 SP gave equivalent secretion and specific activity.\n- Multicopy cbh1 promoter titrated transcription/regulatory factors but was not the primary bottleneck — endochitinase mRNA was ~3× higher than endogenous cbh1 yet secreted protein was lower than CBHI, indicating post-transcriptional limitations.\n- Endochitinase degraded by an endogenous acidic protease after 108h, coinciding with culture pH drop — identified as the major yield-limiting factor.\n- No growth or morphological effects on RutC-30, confirming tolerance to its own endochitinase. \n- Antifungal activity against plant pathogens retained.", "description": "Improved production of T. harzianum endochitinase in T. reesei. Expressed ThEn-42 endochitinase from T. harzianum P1 in T. reesei RutC-30 under the cbh1 promoter. Achieved 130 mg/L — 20× higher than native T. harzianum production. Native prepro signal and CBH1 SP gave equivalent secretion. Main yield limitation was degradation by an endogenous acidic protease at late fermentation stages, not transcription. Multicopy integration caused promoter competition but was not the primary bottleneck."}, {"id": 3, "year": 1996, "title": "Glucose-induced secretion of Trichoderma reesei xylanases.\n", "doi": "https://doi.org/10.1128/aem.62.8.2859-2865.1996", "species": "Trichoderma reesei", "strain": "QM 9414", "target": "XYNI, XYNII", "strategy": "Promoter replacement / Constitutive carbon bypass expression", "promoter": "pki1", "signal_peptide": "native", "yield": "", "units": "", "key_results": "- pki1::xyn1 and pki1::xyn2 transformants completely bypassed glucose carbon catabolite repression. \n- Specific xylanase activities on glucose reached 76 U/mg (ATX1-4) and 145 U/mg (ATX2-12) compared to parental QM 9414 (26 U/mg).\n- On glucose, biomass-normalized productivity was low (4 to 5 U/g) versus xylan growth (10 to 12 U/g) due to a glucose-repressed, less-proliferated secretory pathway with 1.3-fold fewer vesicles.\n- Transformants accumulated ~2 U/g biomass of active intracellular enzyme, accounting for roughly one-third of total secreted activity.", "description": "Glucose-Induced Secretion of T. reesei Xylanases XYN I and XYN II encoding genes (xyn1, xyn2) were placed under the control of the constitutive pki1 (pyruvate kinase) promoter and expressed in T. reesei TU-6, enabling xylanase production on glucose without xylan induction. Both transformant classes secreted their respective xylanases on glucose, confirmed by SDS-PAGE and immunostaining. Best transformants (ATX1-5 and ATX2-12) achieved specific activities of 76 and 145 U/mg protein for XYN I and XYN II respectively on glucose — higher than parental strain on xylan (26 U/mg) due to lower total protein background — but biomass-normalized yields were only ~4–5 U/g vs. 10–12 U/g on xylan. Immunoelectron microscopy revealed that during glucose growth, secretory vesicles were fewer but more densely loaded with XYN II, and more enzyme accumulated in vacuoles of senescent cells — suggesting the secretory pathway capacity on glucose is a bottleneck limiting overall xylanase output rather than transcription."}, {"id": 4, "year": 1997, "title": "Expression and Secretion of Barley Cysteine Endopeptidase B and Cellobiohydrolase I in Trichoderma reesei", "doi": "https://doi.org/10.1128/aem.63.12.4929-4937.1997", "species": "Trichoderma reesei", "strain": "ALKO3713", "target": "Barley Cysteine Endopeptidase B (EPB)", "strategy": "Heterologous expression / cDNA library fusion tracking", "promoter": "cbh1", "signal_peptide": "native", "yield": "", "units": "", "key_results": "- cbh1::epb cassette yielded strong transcript abundance but poor secretion processing. \n- Recombinant epb mRNA and translated protein accumulated selectively in apical/subapical zones, whereas endogenous cbh1 components spanned all hyphae across the colony matrix. \n- Intracellular extracts contained large, aberrantly processed 50 to 70 kDa precursor intermediates (vs 30 kDa mature native barley enzyme) due to host-specific hyper-glycosylation. \n- Immunoelectron tracking confirmed both proteins shared early ER/spherical vesicle routing, but EPB was completely absent from elongated sub-membrane vesicles and cell walls, accumulating instead in conspicuous aggregated structures adjacent to the ER lumen.", "description": "Expression of Barley Endopeptidase B in Trichoderma reesei. Researchers expressed the barley protease Endopeptidase B (EPB) in Trichoderma reesei using the cbh1 promoter to evaluate the fungus as a heterologous protein production host. The recombinant enzyme was successfully secreted, correctly processed, and remained functional. The study demonstrated that T. reesei can efficiently produce and secrete active plant proteins."}, {"id": 5, "year": 1997, "title": "Expression of Barley Endopeptidase B in Trichoderma reesei", "doi": "https://doi.org/10.1128/aem.63.12.4938-4940.1997", "species": "Trichoderma reesei", "strain": "ALKO2221, Rut-C30", "target": "Barley Endopeptidase B (EPB)", "strategy": "Heterologous expression", "promoter": "cbh1", "signal_peptide": "native", "yield": "500", "units": "mg/L", "key_results": "- Highest-producing transformant (ALKO3708) secreted ~500 mg/L EPB, the highest reported yield at the time for a higher-eukaryotic protein produced in T. reesei. \n- Over 90% of recombinant EPB was secreted extracellularly. \n- Maximum cysteine protease activity reached 1,700 U/L in the highest-yielding strain.", "description": "Expression of Barley Endopeptidase B in Trichoderma reesei. Researchers expressed the barley protease Endopeptidase B (EPB) in Trichoderma reesei using the cbh1 promoter to evaluate the fungus as a heterologous protein production host. The recombinant enzyme was successfully secreted, correctly processed, and remained functional. The study demonstrated that T. reesei can efficiently produce and secrete active plant proteins."}, {"id": 6, "year": 1998, "title": "Role of Endoproteolytic Dibasic Proprotein Processing in Maturation of Secretory Proteins in Trichoderma reesei\n", "doi": "https://doi.org/10.1128/aem.64.9.3202-3208.1998", "species": "Trichoderma reesei", "strain": "TU-6", "target": "ShBLE", "strategy": "Proprotein processing engineering + heterologous expression", "promoter": "gpdA (A. nidulans, constitutive) or Tr1 (T. reesei constitutive)", "signal_peptide": "Various artificial prepro sequences tested: dibasic (KR, RK), monobasic (LR), and non-basic (NHA, EHA) processing targets", "yield": "", "units": "", "key_results": "- ShBLE: Secretion completely blocked by pAPMSF when fused to dibasic targets (KR, RK) — intracellular precursor accumulation confirmed dibasic endopeptidase is obligatory for secretion of these constructs.\n- Secretion stimulated by pAPMSF with monobasic (LR) and non-basic (NHA, EHA) targets, suggesting competitive routing through alternative processing pathways. All artificial prosequences correctly cleaved in vivo.\n- T. reesei dibasic endopeptidase: Ca²⁺-dependent, localized in vesicles of low buoyant density, single peak at pH 5.8–6.0 by chromatofocusing — consistent with Kex2-like activity. \n- Demonstrates multiple endoproteolytic pathways in T. reesei with different specificities relevant to heterologous protein secretion design.", "description": "Role of Endoproteolytic Dibasic Proprotein Processing in T. reesei Characterized a Kex2-like dibasic endopeptidase in T. reesei using pAPMSF as a specific irreversible inhibitor. Using ShBLE as a heterologous reporter fused to different proprotein processing sequences, showed that dibasic targets (KR, RK) require cleavage by this endopeptidase for secretion — blocking it causes intracellular precursor accumulation. Non-dibasic targets (LR, NHA, EHA) use alternative processing pathways and are actually secreted better when the dibasic endopeptidase is inhibited. Demonstrates that prosequence design critically determines the secretory fate of heterologous proteins in T. reesei."}, {"id": 7, "year": 1999, "title": "Overexpression of the Saccharomyces cerevisiae Mannosylphosphodolichol Synthase-Encoding Gene in Trichoderma reesei Results in an Increased Level of Protein Secretion and Abnormal Cell Ultrastructure\n", "doi": "https://doi.org/10.1128/aem.65.6.2382-2387.1999", "species": "Trichoderma reesei", "strain": "TU-6", "target": "DPM1", "strategy": "Secretory pathway engineering", "promoter": "pki1", "signal_peptide": "", "yield": "", "units": "", "key_results": "- DPM1: MPD synthase activity increased 2–2.5× in ER membrane fraction of all transformants. \n- Total extracellular protein secretion on lactose increased up to 7× on dry-weight basis (peak at 180–200h). \n- cbh1 transcript unchanged — increased secretion is post-transcriptional. \n- Secreted CBH I protein elevated in all transformants; intracellular CBH I detectable in 3/4 transformants but absent in wild type. \n- Normal glycosylation levels maintained — no hyperglycosylation detected. \n- Abnormal cell ultrastructure: amorphous/flocculous cell wall and 3× more mitochondria vs. control. \n- First report of protein secretion improvement in a filamentous fungus by molecular genetic manipulation.", "description": "Overexpression of the Saccharomyces cerevisiae Mannosylphosphodolichol Synthase-Encoding Gene in Trichoderma reesei. Results in an Increased Level of Protein Secretion and Abnormal Cell Ultrastructure. Investigated whether upregulating early-stage glycosylation machinery could expand the post-translational secretion limits of Trichoderma reesei. Constitutively overexpressed the yeast DPM1 gene, which encodes mannosylphosphodolichol (MPD) synthase, an essential enzyme driving N- and O-glycosylation pathways. Best result: Engineered strains exhibited a 2-fold increase in membrane-bound MPD synthase activity and up to a 7-fold increase in total extracellular protein concentration on a dry-weight basis during fermentation on lactose; however, this high-level secretion imposed physical stress, causing altered cell wall structures and a 3-fold increase in mitochondria count."}, {"id": 8, "year": 2003, "title": "High-Yield Production of a Bacterial Xylanase in the Filamentous Fungus Trichoderma reesei Requires a Carrier Polypeptide with an Intact Domain Structure", "doi": "https://doi.org/10.1128/AEM.69.12.7073-7082.2003", "species": "Trichoderma reesei", "strain": "ALKO3620 and ALKO4468", "target": "Xyn11A endo-1,4-beta-xylanase", "strategy": "Gene fusion strategy / Carrier polypeptide optimization", "promoter": "cel7A", "signal_peptide": "native", "yield": "820", "units": "mg/L", "key_results": "- Expressing xyn11A as a direct fusion to a carrier polypeptide possessing an intact domain structure increased final extracellular secretion yields up to 820 mg/L.\n- Direct fusion to only the signal peptide sequence without a full protein carrier yielded significantly inferior production levels of 150 to 300 mg/L.\n- The native flexible hinge region proved structurally vital, exerting a dominant positive effect on absolute secretion titers and dictating the spatial cleavage efficiency of the active, mature bacterial xylanase.\n- Recombinant Xyn11A accounted for 6% to 10% of total secreted proteins, matching the enzymatic and biophysical properties of native bacterial controls despite a bottleneck where fusion mRNA levels reached only 10% of host cel7A transcripts.", "description": "High-yield production of a bacterial xylanase in the filamentous fungus Trichoderma reesei requires a carrier polypeptide with an intact domain structure. Engineered T. reesei to bypass host translational bottlenecks and optimize the extracellular secretion of foreign bacterial proteins by developing a structural carrier fusion framework. Replaced direct signal peptide-only targeting constructs—which suffered from poor protein yields—with expression cassettes fusing the target sequence to intact endogenous carrier modules, specifically the T. reesei mannanase I (Man5A) core-hinge or cellobiohydrolase II (Cel6A) cellulose-binding domains. Successfully regulated the secretion of target endo-1,4-beta-xylanase (Nonomuraea flexuosa Xyn11A) under the control of the strong cel7A (cbh1) promoter, achieving high-level production reaching up to 820 mg/L. Best result: Demonstrated that utilizing an intact structural carrier domain paired with a flexible hinge linker increases bacterial enzyme yields up to 5.4-fold over non-carrier control baselines while maintaining native-like protein functionality."}, {"id": 9, "year": 2005, "title": "Role of the bga1-Encoded Extracellular β-Galactosidase of Hypocrea jecorina in Cellulase Induction by Lactose", "doi": "https://doi.org/10.1128/AEM.71.2.851-857.2005", "species": "Trichoderma reesei", "strain": "QM9414", "target": "Bga1", "strategy": "Gene deletion + promoter engineering", "promoter": "pki1", "signal_peptide": "native", "yield": "", "units": "", "key_results": "- Δbga1 delayed growth onset on lactose (125h vs 40h in fermentor) and halved biomass yield, but final cbh1/cbh2 transcript levels and cellulase yields were comparable to wild type.\n- bga1 overexpression (up to 30× wild-type activity) improved growth rate on lactose but completely abolished cbh1 and cbh2 expression — excessive lactose hydrolysis suppresses cellulase induction.\n- No intracellular β-galactosidase detected; T. reesei relies entirely on extracellular lactose hydrolysis followed by monosaccharide uptake.\n- Establishes bga1 activity level as a critical tuning parameter for lactose-based industrial cellulase fermentations.", "description": "Role of the bga1-Encoded Extracellular β-Galactosidase of H. jecorina in Cellulase Induction by Lactose. Cloned and characterised bga1, encoding the major extracellular β-galactosidase of T. reesei, and investigated its role in lactose metabolism and cellulase induction by generating deletion and overexpression strains in QM9414. Δbga1 grew significantly slower on lactose but retained near-wild-type cellulase induction, while bga1 overexpression under the pki1 promoter improved growth rate but completely abolished cbh1 and cbh2 expression — demonstrating that β-galactosidase activity level is a critical tuning parameter for cellulase production on lactose. Best result: Established that cellulase induction on lactose occurs optimally at low β-galactosidase activity levels, and that excessive lactose hydrolysis suppresses induction, likely by perturbing the intracellular galactose-1-phosphate signal required for cellulase gene activation."}, {"id": 10, "year": 2007, "title": "Increased Production of Xylanase by Expression of a Truncated Version of the xyn11A Gene from Nonomuraea flexuosa in Trichoderma reesei", "doi": "https://doi.org/10.1128/AEM.02967-06", "species": "Trichoderma reesei", "strain": "ALKO3620", "target": "Xyn11A xylanase\n(Nonomuraea flexuosa, CBM-deleted)", "strategy": "Protein engineering + heterologous expression", "promoter": "cbh1", "signal_peptide": "Man5A signal sequence", "yield": "1.9", "units": "g/L", "key_results": "- Xyn11A (truncated): Cel6A CBD fusion gave best yield of ~1.9 g/L (25% of total secreted protein) in lab-scale fermentation.\n- Truncated constructs gave clearly higher mRNA and xylanase activity than full-length equivalents.\n- Full-length xyn11A induced UPR when fused directly to cel7A terminator; truncated version did not, confirming the bacterial CBM as the source of folding stress.\n- Hinge region of carrier polypeptide positively affected both yield and Kex2 cleavage efficiency.", "description": "Increased Production of Xyn11A in T. reesei. Expressed a CBM-deleted (truncated) version of Xyn11A xylanase from Nonomuraea flexuosa in T. reesei ALKO3620 using cbh1 promoter. CBM deletion improved thermostability and eliminated ER stress caused by the bacterial CBM. Cel6A CBD carrier fusion gave best yield of ~1.9 g/L. Full-length construct induced UPR; truncated version did not."}, {"id": 11, "year": 2008, "title": "Transcriptional Regulation of xyr1, Encoding the Main Regulator of the Xylanolytic and Cellulolytic Enzyme System in Hypocrea jecorina", "doi": "https://doi.org/10.1128/AEM.01143-08", "species": "Trichoderma reesei", "strain": "nx7 (xyr1 deletion strain retransformed with nag1::xyr1)", "target": "XYNI, XYNII, BXLI", "strategy": "Transcription factor engineering (constitutive xyr1 overexpression under nag1 promoter)", "promoter": "nag1", "signal_peptide": "", "yield": "", "units": "", "key_results": "- xyr1 transcription is not inducible by any carbon source or inducer; regulated solely by repression/derepression via Cre1 (CCR on glucose) and Ace1 (3.8–6.4× elevation in Δace1). \n- 10 Cre1-binding sites and 2 Ace1-binding sites identified in xyr1 promoter. \n- Xyr1 protein is constitutively present at low levels; de novo synthesis not required for initial xyn1 induction (shown by cycloheximide experiment). \n- Constitutive xyr1 expression (nx7) caused up to several hundredfold increase in xyn1 transcription under inducing conditions; elevated bxl1 and xyn2 transcripts; earlier and higher xylanase and β-xylosidase activities on xylan vs. parental QM9414.", "description": "Transcriptional Regulation of xyr1, Encoding the Main Regulator of the Xylanolytic and Cellulolytic Enzyme System in Hypocrea jecorina. Investigated the transcriptional regulation of xyr1 itself in T. reesei QM9414, demonstrating that xyr1 is subject only to repression/derepression — not induction — via Cre1-mediated CCR on glucose and Ace1-mediated repression, with 10 Cre1 and 2 Ace1 binding sites identified in the xyr1 promoter. A constitutively expressing strain (nx7) was constructed by placing xyr1 under the H. atroviridis nag1 promoter at the xyr1 locus. Best result: Constitutive xyr1 expression drove up to several hundredfold increases in xyn1 transcription under inducing conditions, elevated bxl1 and xyn2 transcripts, and earlier/higher xylanase and β-xylosidase activities on xylan — establishing xyr1 deregulation as an effective strategy for improving xylanolytic enzyme production."}, {"id": 12, "year": 2009, "title": "Novel Coprinopsis cinerea Polyesterase That Hydrolyzes Cutin and Suberin", "doi": "https://doi.org/10.1128/AEM.02103-08", "species": "Trichoderma reesei", "strain": "VTT D-00775", "target": "CcCUT1", "strategy": "Heterologous expression", "promoter": "cbh1", "signal_peptide": "native", "yield": "1.4", "units": "g/L", "key_results": "- CcCUT1: 1.4 g/L purified protein (18.8 kDa) from 20L fermentor. \n- Native signal sequence correctly processed in T. reesei — mature protein starts at Gln28 (N-terminus cyclized to pyroglutamic acid).\n- Higher activity on short-chain (C2–C10) than long-chain (C16–C18) fatty acid esters. pH optimum 7–8; stable pH 4–10 at room temperature. - Retained ~80% activity after 20h at 50°C; lost activity at 60°C.\n- Depolymerized apple cutin (10.1% substrate) and birch outer bark suberin (1.9% substrate); activity enhanced by addition of T. reesei hydrophobin II (HFBII).", "description": "Novel Coprinopsis cinerea Polyesterase That Hydrolyzes Cutin and Suberin Three cutinase-like genes from the basidiomycete C. cinerea were identified by genome similarity searches and expressed in a cbh1-deleted T. reesei strain under the cbh1 promoter. All three showed esterase activity in shake flasks, but only CcCUT1 (CC1G_09668.1) was taken to fermentor scale, yielding 1.4 g/L purified protein. The enzyme was characterized as a thermostable polyesterase active on short-to-medium chain fatty acid esters, with lipase activity, and capable of depolymerizing apple cutin (10.1% substrate) and birch suberin (8.3% with hydrophobin HFBII addition)."}, {"id": 13, "year": 2010, "title": "Exploring laccase-like multicopper oxidase genes from the ascomycete Trichoderma reesei: a functional, phylogenetic and evolutionary study", "doi": "https://doi.org/10.1186/1471-2091-11-32", "species": "Trichoderma reesei", "strain": "RUT-C30", "target": "TrLAC1", "strategy": "Homologous overexpression + codon optimization", "promoter": "cbh1", "signal_peptide": "native", "yield": "280", "units": "mg/L", "key_results": "- TrLAC1 purified to homogeneity; 104 kDa by SDS-PAGE (predicted mature 67 kDa — difference attributed to glycosylation at 6 N-glycosylation sites). \n- pH optimum: 4 (ABTS), 7 (syringaldazine); temperature optimum: 40–45°C; not thermostable (activity lost at 45°C after 2h). \n- Km = 0.137 mM, Vmax = 9.37 nkat/mL, specific activity = 2.13 nkat/mg on ABTS — ~800× lower than basidiomycete laccases. \n- Stable across pH 3–7. \n- Phylogenetic analysis confirmed LMCO and classical laccases form two distinct groups; positive selection identified 16 sites in basidiomycete lineage driving ligninolytic function.", "description": "Exploring laccase-like multicopper oxidase genes from the ascomycete Trichoderma reesei: a functional, phylogenetic and evolutionary study. Identified 6 laccase-like multicopper oxidase (LMCO) genes in the T. reesei genome and selected candidate gene jgi|124079| for homologous overexpression in T. reesei RUT-C30 under the cbh1 promoter. The resulting recombinant protein TrLAC1 was purified and biochemically characterized — the first functional LMCO characterized from T. reesei. Phylogenetic and evolutionary analyses confirmed that LMCO and classical laccases form two distinct groups, with positive selection driving evolution toward ligninolytic activity in basidiomycete laccases."}, {"id": 14, "year": 2012, "title": "Achieving efficient protein expression in Trichoderma reesei by using strong constitutive promoters", "doi": "https://doi.org/10.1186/1475-2859-11-84", "species": "Trichoderma reesei", "strain": "QM9414", "target": "XYNII\n(native)", "strategy": "Promoter engineering", "promoter": "pdc, eno, gpd", "signal_peptide": "native", "yield": "1.61 (from pdc)\n1.52 (from eno)", "units": "g/L", "key_results": "- XYN2: pdc promoter gave 1.61 g/L (9266 IU/mL) and eno gave 1.52 g/L (8866 IU/mL) — both highest recombinant XYN2 production reported at time of publication, surpassing native T. reesei (1800 IU/mL fed-batch) and heterologous P. pastoris production (3676 IU/mL). \n- Gpd promoter gave only 686 IU/mL (~7% of pdc), despite gpd being the highest expressed of the three at low glucose — consistent with pdc and eno transcription being more strongly induced at high glucose (7% used for production). \n- Virtually no cellulase co-produced (CMCase 0.3 IU/mL, filter paper 0.03 FPIU/mL).", "description": "Achieving efficient protein expression in T. reesei using strong constitutive promoters. Screened 13 glucose metabolism genes by RT-qPCR to identify the most highly transcribed under high glucose. Identified pdc and eno promoters as top candidates, outperforming gpd at high glucose concentrations. Expressed XYN2 under these promoters in QM9414, achieving 1.61 g/L (pdc) and 1.52 g/L (eno) in glucose medium — the highest recombinant XYN2 production reported at the time. Virtually no cellulase co-produced, confirming that constitutive promoters + high glucose selectively redirect secretory capacity to the target protein."}, {"id": 15, "year": 2012, "title": "Overexpression of an exotic thermotolerant β-glucosidase in trichoderma reesei and its significant increase in cellulolytic activity and saccharification of barley straw", "doi": "https://doi.org/10.1186/1475-2859-11-63", "species": "Trichoderma reesei", "strain": "QM9414 (parent) and BGLI-overexpressing transformants T1–T4", "target": "Thermotolerant β-glucosidase BGLI from Periconia sp. (bgl1)", "strategy": "Heterologous overexpression of β-glucosidase to improve cellulase performance", "promoter": "Ptef1α", "signal_peptide": "native", "yield": "", "units": "", "key_results": "- β-glucosidase activity increased 10.5-fold (23.9 vs 2.2 IU/mg at 24 h).\n- Total cellulase activity reached ~39 FPU/mg at 24 h.\n- Improved saccharification of untreated and pretreated barley straw and microcrystalline cellulose.\n- Recombinant BGLI retained full activity after 2 h at 60°C and ~88% activity across pH 3–9.", "description": "Overexpression of an Exotic Thermotolerant β-Glucosidase in Trichoderma reesei. Researchers overexpressed a thermotolerant β-glucosidase (BGLI) from Periconia sp. in Trichoderma reesei QM9414 using the tef1α promoter. The engineered strains showed greatly increased β-glucosidase activity and improved cellulose saccharification. The study demonstrated that heterologous enzyme expression can enhance biomass conversion efficiency in T. reesei"}, {"id": 16, "year": 2012, "title": "A versatile toolkit for high throughput functional genomics with Trichoderma reesei", "doi": "https://doi.org/10.1186/1754-6834-5-1", "species": "Trichoderma reesei", "strain": "Δtku70", "target": "Tku70", "strategy": "Functional genomics platform development; gene knockout toolkit; NHEJ engineering", "promoter": "", "signal_peptide": "", "yield": "", "units": "", "key_results": "- Generated 18 successful gene deletion mutants from 20 targets.\n- Achieved homologous integration frequencies of 33–100% in the Δtku70 background.\n- Created genome-wide knockout primer sets covering 8,661 of 9,143 annotated genes.\n- Demonstrated removal of the NHEJ-deficient background and combination of mutations through sexual crossing.", "description": "A versatile toolkit for high throughput functional genomics with Trichoderma reesei. Developed a high-throughput functional genomics toolkit for Trichoderma reesei based on NHEJ-deficient strains, yeast-mediated recombination, and spore electroporation. The authors generated genome-wide knockout primer libraries and validated efficient construction of deletion mutants. They also created the sexually competent strain QF1, enabling removal of the Δtku70 background and rapid generation of multiple mutants through crossing, providing a scalable platform for systematic analysis of genes involved in cellulase production and fungal physiology."}, {"id": 17, "year": 2014, "title": "Comparison of intracellular and secretion-based strategies for production of human α-galactosidase A in the filamentous fungus Trichoderma reesei\n", "doi": "https://doi.org/10.1186/s12896-014-0091-y", "species": "Trichoderma reesei", "strain": "Rut-C30", "target": "Human α-galactosidase A \n(GLA)", "strategy": "Secretion engineering + carrier fusion engineering", "promoter": "cbh1", "signal_peptide": "CBH1 SP + CBH1 carrier fusion (secretion strategy)\nZERA (gamma zein peptide from maize; intracellular strategy)", "yield": "20 (secretion); \n636 (intracellular)", "units": "mg/L", "key_results": "- GLA (secretion): 20 mg/L; specific activity comparable to commercially available mammalian-derived GLA. \n- Secretion bottlenecked by UPR, ERAD activation, and extracellular protease degradation. \n- GLA (intracellular): 636 mg/L — 31× higher than secretion strategy; accumulated in ER-derived protein bodies purified by gravity-based density separation. \n- However, specific activity was 5–10× lower due to enzyme incompatibility with alkaline pH during purification. \n- Intracellular strategy concluded superior for yield but secretion strategy superior for specific activity. \n- UPR and ERAD identified as key bottlenecks for heterologous therapeutic protein production in T. reesei.", "description": "Comparison of intracellular and secretion-based strategies for production of human α-galactosidase A in the filamentous fungus Trichoderma reesei. Compared intracellular expression versus secretion-based expression of human α-galactosidase A (GLA) in T. reesei. Tested multiple secretion strategies including CBHI-based carrier fusions and ER-retention approaches. Secreted GLA accumulated at substantially higher levels than intracellular GLA, demonstrating that T. reesei is better suited for secretion than intracellular production of this lysosomal enzyme. The study established secretion engineering as the preferred route for therapeutic protein production in T. reesei and showed that carrier-fusion strategies can dramatically improve recovery of functional human proteins."}, {"id": 18, "year": 2014, "title": "Deciphering the Effect of the Different N-Glycosylation Sites on the Secretion, Activity, and Stability of Cellobiohydrolase I from Trichoderma reesei\n", "doi": "https://doi.org/10.1128/AEM.00261-14", "species": "Trichoderma reesei", "strain": "TU-6", "target": "CBH1\n(native; N-glycosylation site mutants)", "strategy": "Glycosylation engineering (site-directed mutagenesis)", "promoter": "cbh1", "signal_peptide": "native", "yield": "", "units": "", "key_results": "- CBH1 (native): Removal of one or two N-glycosylation sites had minimal effect on extracellular secretion. \n- Removal of all three sites induced UPR target genes and severely compromised secretion in a calnexin deletion background, indicating ER quality control dependence. \n- Thermal reactivity was significantly decreased by removal of either Asn45 or Asn384 — but not Asn270 — during hydrolysis of soluble substrate, identifying Asn45 and Asn384 as the glycosylation sites critical for thermostability.", "description": "Deciphering the Effect of the Different N-Glycosylation Sites on the Secretion, Activity, and Stability of Cellobiohydrolase I from Trichoderma reesei. Systematically mutated the individual N-glycosylation sites of CBHI (Cel7A) to determine how each glycosylation position affects protein secretion, enzymatic activity, and thermal stability. Found that different glycosylation sites contribute distinctively to folding and secretion efficiency rather than serving redundant functions. Some glycosylation-site deletions reduced secretion and stability, while others had minimal effects. Demonstrates that glycosylation engineering can be used as a tool to optimize recombinant protein production and enzyme performance in T. reesei."}, {"id": 19, "year": 2014, "title": "A truncated form of the Carbon catabolite repressor 1 increases cellulase production in Trichoderma reesei\n", "doi": "https://doi.org/10.1186/s13068-014-0129-3", "species": "Trichoderma reesei", "strain": "QM6a-CREI96", "target": "cbh1, cbh2", "strategy": "Transcription factor engineering", "promoter": "cbh1, cbh2, cre1, xyr1", "signal_peptide": "native", "yield": "", "units": "", "key_results": "- Replacing the wild-type locus with the truncated cre1-96 mutation (QM6a-CREI96) drove the hyper-expressed cellulase phenotype of Rut-C30. \n- Heterologously expressed and purified single-zinc-finger Cre1-96 protein retained full specific binding to all three cbh1 promoter URR target sites in EMSA assays, which dropped significantly upon adding an inverted 5'-SYTGRG-3' mutated competitor. \n- CHART-PCR verified this targeted interaction systematically forced an open chromatin configuration across cbh1 and xyr1 core promoters during repressive glucose cultivation, correlating directly to elevated extracellular cellulase activity (45.8 U/mg dry weight) over the standard de-repressed delta-cre1 baseline (29.1 U/mg dry weight).", "description": "A truncated form of the Carbon catabolite repressor 1 increases cellulase production in Trichoderma reesei. Engineered Trichoderma reesei using transcription factor engineering by mimicking the industrial mutant lineage Rut-C30 to express the single-zinc-finger truncated repressor fragment cre1-96 under native control. Best result: The truncated CREI-96 protein functioned as an active dominant regulator rather than a loss-of-function variant, interacting directly with core promoters and upregulating the htf1 helicase to open up local chromatin, yielding high de-repressed transcript accumulation of cbh1, cbh2, and xyr1 on D-glucose without causing severe growth deficiencies."}, {"id": 20, "year": 2014, "title": "Erythritol production on wheat straw using Trichoderma reesei", "doi": "https://doi.org/10.1186/s13568-014-0034-y", "species": "Trichoderma reesei", "strain": "QPEC1, QBEC2, RPEC1, RBEC2", "target": "Err1", "strategy": "Metabolic engineering / gene overexpression", "promoter": "pki, bxl1", "signal_peptide": "", "yield": "", "units": "", "key_results": "- err1 overexpression increased intracellular erythritol 1.6–3.2× on D-xylose in wild-type background. \n- On pretreated wheat straw, err1 overexpression in Rut-C30 (RPEC1, RBEC2) produced ~10× more erythritol than wild-type overexpression strains, reaching ~5 mg/L peak at 42h. \n- Wild-type overexpression strains showed no improvement on wheat straw despite increased err1 transcript levels.", "description": "Erythritol production on wheat straw using Trichoderma reesei. Overexpressed the native erythrose reductase gene err1 in both wild-type T. reesei (QM6atmus53) and the cellulase hyperproducing strain Rut-C30 using either the constitutive pki or inducible bxl1 promoter. Erythritol accumulated intracellularly and was not secreted. On D-xylose, wild-type overexpression strains showed up to 3.2-fold higher intracellular erythritol. On alkaline organosolve-pretreated wheat straw in bioreactor, only the Rut-C30 overexpression strains showed significantly increased erythritol production (~10-fold over wild-type strains), reaching ~5 mg/L at 42h peak, demonstrating proof-of-concept for erythritol biosynthesis from lignocellulosic biomass in T. reesei."}, {"id": 21, "year": 2015, "title": "Novel Strategies for Genomic Manipulation of Trichoderma reesei with the Purpose of Strain Engineering\n", "doi": "https://doi.org/10.1128/AEM.01545-15", "species": "Trichoderma reesei", "strain": "QM6a-derived auxotrophic strains", "target": "GOXA (Aspergillus niger glucose oxidase; reporter)", "strategy": "Site-directed integration using split-marker auxotrophic system", "promoter": "pki1", "signal_peptide": "native", "yield": "", "units": "", "key_results": "- Achieved up to 100% correct targeted integration and demonstrated that genomic locus and cassette orientation significantly affect expression levels. \n- Established a reliable platform for repeated genome engineering in T. reesei.", "description": "Novel Strategies for Genomic Manipulation of T. reesei with the Purpose of Strain Engineering. Developed a split-marker auxotrophic integration system using asl1, hah1, and pyr4 selection in a double-auxotrophic QM6a-derived host strain. Used GOXA (A. niger glucose oxidase) as a reporter to evaluate integration efficiency and expression levels across different genomic loci. Best result: Achieved up to 100% correct targeted integration, and demonstrated that both genomic locus and cassette orientation significantly affect expression levels — establishing a reliable platform for repeated, markerless genome engineering in T. reesei."}, {"id": 22, "year": 2015, "title": "l-Methionine repressible promoters for tuneable gene expression in Trichoderma reesei\n", "doi": "https://doi.org/10.1186/s12934-015-0308-3", "species": "Trichoderma reesei", "strain": "QM9414-derived strains", "target": "Aspergillus niger sucA (extracellular invertase; reporter only), Escherichia coli lacZ (β-galactosidase; reporter only)", "strategy": "Promoter engineering + Transcriptional tuning", "promoter": "met3, TauD-like dioxygenase promoter (P_tauD)", "signal_peptide": "native", "yield": "", "units": "", "key_results": "- Novel P_tauD promoter achieved tight, tunable transcriptional repression of both target reporter proteins upon L-methionine addition.\n- System demonstrated high portability, successfully regulating extracellular invertase on wheat straw and intracellular β-galactosidase on glucose and glycerol media.\n- The initial met3 promoter candidate failed completely on wheat straw, demonstrating no repression.", "description": "L-Methionine repressible promoters for tuneable gene expression in T. reesei. Engineered T. reesei to tightly control gene expression across multiple carbon sources (wheat straw, glucose, glycerol) by developing a novel repressible promoter system. Replaced the traditional yeast met3 orthologue promoter—which failed to repress expression on complex biomass—with a novel transcriptomics-identified TauD-like dioxygenase promoter P_tauD. Successfully regulated the expression of two target reporter proteins, extracellular invertase (Aspergillus niger sucA) and beta-galactosidase (Escherichia coli lacZ), achieving complete transcriptional shutoff upon adding L-methionine. Best result: Tight, portable, and tuneable gene repression using the P_tauD promoter across both complex wheat straw and simple sugar media."}, {"id": 23, "year": 2015, "title": "Effects of Trichothecene Production on the Plant Defense Response and Fungal Physiology: Overexpression of the Trichoderma arundinaceum tri4 Gene in T. harzianum\n", "doi": "https://doi.org/10.1128/AEM.01626-15", "species": "Trichoderma harzianum", "strain": "T34-5.27-tri4", "target": "Tri4 cytochrome P450 monooxygenase", "strategy": "Metabolic pathway engineering / Sequential heterologous gene overexpression", "promoter": "tss1", "signal_peptide": "N/A \n(intracellular)", "yield": "", "units": "", "key_results": "- Recombinant expression achieved maximum EPT titers of 36.43 ug/mL (tri4.1), 29.74 ug/mL (tri4.2), and 28.31 ug/mL (tri4.3) after 8 days of culture in YEPD.\n- Intracellular production of EPT led to a significant 38.4% to 54.28% depletion of endogenous squalene reserves, correlating with a 3.7- to 5.2-fold compensatory transcriptional up-regulation of the squalene epoxidase gene (erg1). Total ergosterol production was unaffected, indicating EPT was synthesized via direct channeling of newly produced farnesyl pyrophosphate (FPP).\n- Pure EPT displayed no standalone in vitro antifungal activity against Botrytis cinerea or Fusarium sporotrichioides, nor did it show any plant phytotoxicity up to 4 ug/mL (contrasting sharply with downstream pathway intermediates like trichodermol and the end-product harzianum A).\n- Functional strain evaluation in planta showed that tri4 overexpression/EPT accumulation moderately reduced root colonization efficiency (ratio of 0.82 compared to control) and suppressed baseline transcription of tomato defense markers (PR1b1, PINI, TomLoxA) and development genes (ACCS, GAI) in hydroponic root environments.", "description": "Production of correctly folded sweet protein brazzein in T. reesei using synthetic expression system (SES) and cbh1 promoter. Expressed brazzein from Pentadiplandra brazzeana in a protease-deficient T. reesei M1908 strain (11 proteases deleted) using CRISPR/Cas9-targeted integration at egl1 and cbh1 loci. Both SES (CBHI carrier fusion) and cbh1 promoter constructs produced brazzein in 24-well cultures; the SES system achieved ~1.3 g/L in a 250-mL fed-batch bioreactor — the highest reported yield for brazzein at the time. LC-HCMS confirmed correct sequence and N-terminal pyroglutamic acid formation. CD spectroscopy and Timegated Raman spectroscopy confirmed intact secondary structure, correct disulfide bonding, and thermostability up to ~80°C. DLS of 24-month-stored material confirmed 99.6% monomeric conformation, demonstrating long-term stability of T. reesei-produced brazzein."}, {"id": 24, "year": 2015, "title": "Characterization of a copper responsive promoter and its mediated overexpression of the xylanase regulator 1 results in an induction-independent production of cellulases in Trichoderma reesei", "doi": "https://doi.org/10.1186/s13068-015-0249-4", "species": "Trichoderma reesei", "strain": "QM9414", "target": "XYR1, CEL7A, CEL7B, eGFP (reporter)", "strategy": "Promoter engineering (copper-responsive) + transcription factor engineering", "promoter": "Ptcu1", "signal_peptide": "native", "yield": "", "units": "", "key_results": "- eGFP: Fluorescence tightly copper-dependent — confirms Ptcu1 functionality. \n- CEL7B: CMC and pNPC activity on glucose and glycerol without CuSO4; absent with 10 μM CuSO4. \n- CEL7A: Detectable by Western blot but negligible pNPC activity — likely misfolded under these conditions. \n- XYR1: Ptcu1-driven overexpression achieved full cellulase production on glucose and glycerol without inducer — equivalent to Avicel-induced QM9414. \n- Demonstrates XYR1 overexpression alone is sufficient to overcome carbon catabolite repression.", "description": "Characterization of a copper responsive promoter and its mediated overexpression of XYR1 results in induction-independent cellulase production in T. reesei. Characterized Ptcu1, a 1715-bp promoter induced by copper deprivation (<200 nM CuSO4) and repressed at >500 nM, and used it to drive expression of XYR1 and individual cellulase genes independently of carbon source. Best result: Ptcu1-driven XYR1 overexpression achieved full cellulase production on glucose and glycerol without any inducer — equivalent to Avicel-induced wild-type QM9414 — demonstrating that XYR1 overexpression alone is sufficient to overcome carbon catabolite repression."}, {"id": 25, "year": 2015, "title": "Xpp1 regulates the expression of xylanases, but not of cellulases in Trichoderma reesei", "doi": "https://doi.org/10.1186/s13068-015-0298-8", "species": "Trichoderma reesei", "strain": "QM6aΔxpp1, QM6aOExpp1", "target": "XYNII, XYNI, BXL2", "strategy": "Transcription factor engineering (gene deletion + overexpression)", "promoter": "pki", "signal_peptide": "native", "yield": "", "units": "", "key_results": "- Δxpp1 increased endo-xylanolytic and β-xylosidase activities after 72h on xylan; OExpp1 reduced them — confirming Xpp1 as a late-stage xylanase repressor.\n- Xpp1 induced by both d-glucose and high d-xylose; proposed as mediator of a CCR-independent xylose feedback loop dampening xylanase expression at later cultivation stages.\n- xyn1 and bxl2 also regulated by Xpp1; all target genes share an inverted AGAA-repeat and WCTAGW palindrome in their promoters.\n- Cellulase expression (cbh1, cbh2, egl1) completely unaffected — making Xpp1 the first T. reesei regulator capable of specifically shifting the cellulase-to-xylanase ratio.", "description": "Xpp1 regulates the expression of xylanases, but not of cellulases in T. reesei. Identified Xpp1 (Xylanase promoter-binding protein 1) as a xylanase-specific transcriptional repressor in T. reesei by generating deletion and overexpression strains in QM6a. Used in vivo DMS footprinting to confirm that Xpp1 binds a palindromic TCTAGA sequence overlapping the AGAA-box in the xyn2 promoter. Showed that Xpp1 expression is induced by both d-glucose and high d-xylose, and proposed it as the mediator of a CCR-independent xylose feedback loop that dampens xylanase expression at later cultivation stages. Best result: Δxpp1 increased xylanolytic activity while leaving cellulase expression (cbh1, cbh2, egl1) completely unaffected — establishing Xpp1 as the first T. reesei regulator capable of specifically shifting the cellulase-to-xylanase ratio, with direct applications for reducing wasteful xylanase co-secretion during industrial cellulase production."}, {"id": 26, "year": 2015, "title": "Enabling Low Cost Biopharmaceuticals: A Systematic Approach to Delete Proteases from a Well-Known Protein Production Host Trichoderma reesei", "doi": "https://doi.org/10.1371/journal.pone.0134723", "species": "Trichoderma reesei", "strain": "M124", "target": "Therapeutic antibodies (IgG/MAB01/rituximab), IFNα2b, IGF1 (model proteins used to validate protease-reduced host)", "strategy": "Host engineering — sequential multiplex protease gene deletion (7 genes: pep1, tsp1, slp1, gap1, gap2, pep4, pep3) with pyr4 marker recycling in Δmus53 background", "promoter": "", "signal_peptide": "native", "yield": "", "units": "", "key_results": "- Sequential deletion of 7 proteases (pep1, tsp1, slp1, gap1, gap2, pep4, pep3) reduced total casein protease activity to 4% of parental M124 — a 27-fold reduction.\n- Δ6 strain (M396) supernatant fully preserved MAB01 antibody heavy chain after 20h incubation at pH 4.2; IFNα2b and IGF1 retained full-length protein overnight vs complete degradation in parental strain.\n- Protease deletion strains grew faster than M124 in fermentor; M396 produced 22% more total secreted protein than parental.\n- Major antibody-degrading proteases identified as PEP1 (aspartic), TSP1 (trypsin-like serine), and SLP1 (subtilisin); serine proteases most responsible for heavy chain cleavage at pH 5.5.", "description": "Enabling Low Cost Biopharmaceuticals: A Systematic Approach to Delete Proteases from T. reesei. Identified 13 major secreted proteases responsible for degradation of therapeutic antibodies, IFNα2b, and IGF1 using inhibitor studies and affinity purification with LC-MS/MS. Sequentially deleted the 7 most problematic (pep1, tsp1, slp1, gap1, gap2, pep4, pep3) from strain M124 using pyr4 loopout marker recycling in a Δmus53 background to facilitate homologous recombination. Best result: 7-protease deletion strain reduced total casein protease activity to 4% of parental; 6-protease deletion strain fully stabilised MAB01 antibody heavy chain overnight at pH 4.2, with IFNα2b and IGF1 also substantially stabilised — while protease deletion strains paradoxically grew faster and secreted 22% more total protein than the parental strain."}, {"id": 27, "year": 2015, "title": "Deletion of homologs of the SREPB pathway results in hyper-production of cellulases in Neurospora crassa and Trichoderma reesei", "doi": "https://doi.org/10.1186/s13068-015-0297-9", "species": "Trichoderma reesei", "strain": "QM6aΔtul1, QM6aΔsah2", "target": "Native cellulase complex ", "strategy": "Host engineering — gene deletion of SREBP pathway components (tul1, sah2)", "promoter": "", "signal_peptide": "", "yield": "", "units": "", "key_results": "- Both QM6aΔtul1 and QM6aΔsah2 showed increased secreted protein and endoglucanase activity under Avicel conditions across a 7-day time course vs. parental QM6aΔpyr4. \n- QM6aΔtul1 showed a stronger hyper-production phenotype than QM6aΔsah2, consistent with the N. crassa findings. \n- No phenotypic differences observed on glucose. \n- Demonstrates conservation of the Dsc/SREBP pathway role in regulating cellulase secretion between N. crassa and T. reesei.", "description": "Deletion of homologs of the SREBP pathway results in hyper-production of cellulases in Neurospora crassa and Trichoderma reesei. Screened 567 N. crassa single-gene deletion strains for cellulase hyper- or hypo-production on Avicel, identifying SREBP pathway components (dsc-2/tul-1 E3 ligase complex and transcription factor sah-2) as novel regulators of protein secretion under cellulosic conditions. To validate conservation of this finding, orthologs tul1 and sah2 were deleted in T. reesei QM6a. Best result: both QM6aΔtul1 and QM6aΔsah2 showed significantly increased secreted protein and endoglucanase activity over 7 days on Avicel, with Δtul1 showing the stronger phenotype — establishing the SREBP/Dsc pathway as a conserved regulator of cellulase hyper-production in filamentous fungi."}, {"id": 28, "year": 2016, "title": "Revisiting overexpression of a heterologous β-glucosidase in Trichoderma reesei: fusion expression of the Neosartorya fischeri Bgl3A to cbh1 enhances the overall as well as individual cellulase activities", "doi": "https://doi.org/10.1186/s12934-016-0520-9", "species": "Trichoderma reesei", "strain": "TU-6", "target": "NfBgl3A\n(Neosartorya fischeri)", "strategy": "Carrier fusion + heterologous overexpression", "promoter": "chb1", "signal_peptide": "CBH1", "yield": "", "units": "", "key_results": "- NfBgl3A: Best transformant T4 achieved 69.7 U/mL β-glucosidase activity — 175× wild-type TU-6 (0.4 U/mL). \n- T1, T7, T3 achieved 130×, 132×, 106× respectively. \n- Biochemical properties (pH optimum 5.0, temperature optimum 80°C, thermostable at 70°C) identical to P. pastoris-expressed NfBgl3A. \n- CBHI activity increased in all transformants due to extra cbh1 copies introduced by the fusion strategy. \n- Endoglucanase activity increased in T1, T3, T4 — hypothesized to be driven by transglycosylation-generated sophorose acting as a cellulase inducer. \n- Overall cellulase activity on Avicel improved up to 2.5× (T4) and 2.4× on filter paper (T1). \n- Cellobiose in hydrolysates decreased from 158.4 μM (TU-6) to 19.7–35.5 μM in all transformants, confirming effective relief of cellobiose inhibition.", "description": "Heterologous expression of Knufia chersonesos lipase Kc_Lip in T. reesei for PBAT hydrolysis characterization. Kc_Lip, a secretory lipase identified via proteomics of PBAT-grown K. chersonesos, was expressed in T. reesei QM6a Δpyr4 (strain Lipex) after unsuccessful expression in K. phaffii. The gene was codon-optimized for T. reesei, fused to a CBH1 signal peptide and C-terminal StrepTag II, and placed under the constitutive tef1 promoter with targeted integration at the pyr4 locus. Secreted lipase activity increased from 33 U/L (wildtype) to 53 U/L in the transformed strain, reaching 576 U/L after 50× concentration. Purified Kc_Lip released the PBAT trimer BTaB but not monomeric terephthalic acid, while the companion cutinase Kc_Cut (expressed in K. phaffii) completely hydrolyzed BTaB — confirming cooperative depolymerization of PBAT by the two K. chersonesos enzymes."}, {"id": 29, "year": 2016, "title": "Xenobiotic Compounds Degradation by Heterologous Expression of a Trametes sanguineus Laccase in Trichoderma atroviride", "doi": "https://doi.org/10.1371/journal.pone.0147997", "species": "Trichoderma atroviride", "strain": "IMI206040", "target": "Lcc1 (Trametes sanguineus)", "strategy": "Heterologous expression + bioremediation engineering", "promoter": "pki1\n(T. reesei)", "signal_peptide": "native", "yield": "", "units": "", "key_results": "- Lcc1: Successfully secreted into culture medium using native SP. \n- Kinetic parameters closely matched native enzyme (Km 48.1 vs 41.3 μM; kcat 69.7 vs 76.7 s⁻¹ for ABTS). Slightly less thermostable than native — retained 92% activity at 50°C and 46% at 60°C after 1h; activity lost at 70°C. \n- Active toward ABTS, syringaldazine, 2,6-DMP, and guaiacol.", "description": "Xenobiotic compounds degradation by heterologous expression of T. sanguineus laccase in T. atroviride. Expressed Lcc1 from Trametes sanguineus in T. atroviride IMI206040 using a novel integration vector (pUE10) that directed site-specific integration near the blu17 terminator locus, reducing transformant variability. The native T. sanguineus SP successfully directed secretion. Purified recombinant laccase retained kinetic properties and substrate range closely matching the native enzyme. The laccase-expressing strain completely removed BPA, degraded phenanthrene and benzo[α]pyrene by 97–99%, and removed 35% of phenolic compounds from biorefinery wastewater, demonstrating strong bioremediation potential."}, {"id": 30, "year": 2016, "title": "A β-glucosidase hyper-production Trichoderma reesei mutant reveals a potential role of cel3D in cellulase production", "doi": "https://doi.org/10.1186/s12934-016-0550-3", "species": "Trichoderma reesei", "strain": "TRB1 (derived from RUT-C30)", "target": "BGL1 (Cel3A β-glucosidase)", "strategy": "Overexpression + insertional mutagenesis / strain engineering", "promoter": "Modified CBH1 promoter (Pcbh)", "signal_peptide": "native", "yield": "", "units": "", "key_results": "- TRB1 reached 19 IU/mL β-glucosidase activity (≈27-fold higher than RUT-C30), showed increased CBH and EG activities, faster cellulase induction, improved saccharification, and loss of cel3D expression was associated with the hyper-production phenotype.", "description": "A β-Glucosidase Hyper-Production Trichoderma reesei Mutant Reveals a Potential Role of cel3D in Cellulase Production. Generated a β-glucosidase overexpression strain by introducing the bgl1 (cel3A) gene under a modified CBH1 promoter. A random integration event disrupted cel3D, unexpectedly creating a strain with greatly enhanced β-glucosidase production and improved cellulase performance. The mutant exhibited ~27-fold higher β-glucosidase activity than the parental strain, enhanced cellulase induction, and improved biomass saccharification. Revealed a previously unrecognized regulatory role for cel3D in cellulase production and demonstrated how insertional mutagenesis can uncover novel expression-control mechanisms in T. reesei."}, {"id": 31, "year": 2016, "title": "The ACEII recombinant Trichoderma reesei QM9414 strains with enhanced xylanase production and its applications in production of xylitol from tree barks", "doi": "https://doi.org/10.1186/s12934-016-0614-4", "species": "Trichoderma reesei", "strain": "QM9414", "target": "ACE2", "strategy": "Overexpression of native ace2 transcription factor", "promoter": "pki1", "signal_peptide": "native", "yield": "", "units": "", "key_results": "- T/Ace2-2 showed ~2× higher xylanase activity (71.56 IU/mL) and ~2× higher cellulase activity (15.07 FPU/mL) than parental QM9414. \n- Maximum xylitol production reached 10.52 g/L (0.21 g/g conversion rate) from bark substrate. \n- Demonstrated that ace2 overexpression enhances lignocellulose degradation and downstream bioconversion.", "description": "The ACEII recombinant T. reesei QM9414 strains with enhanced xylanase production and its applications in production of xylitol from tree barks. Overexpressed the native transcription factor ACE2 under the pki1 promoter in T. reesei QM9414, generating five stable transformants using the pace2-hph-PRIM vector. Best result: Top transformant T/Ace2-2 showed ~2× higher xylanase activity (71.56 IU/mL) and ~2× higher cellulase activity (15.07 FPU/mL) than parental QM9414, and achieved 10.52 g/L xylitol (0.21 g/g conversion rate) from bark substrate — demonstrating that ace2 overexpression enhances both lignocellulose degradation and downstream bioconversion."}, {"id": 32, "year": 2016, "title": "Characterization and Strain Improvement of a Hypercellulytic Variant, Trichoderma reesei SN1, by Genetic Engineering for Optimized Cellulase Production in Biomass Conversion Improvement", "doi": "https://doi.org/10.3389/fmicb.2016.01349", "species": "Trichoderma reesei", "strain": "SPB2", "target": "BGL1", "strategy": "Gene overexpression + host engineering (pyr4 deletion for auxotrophic selection)", "promoter": "Modified cbh1 (4-copy artificial cbh1 promoter)", "signal_peptide": "native", "yield": "", "units": "", "key_results": "- SPB2 achieved 17.1-fold higher BGL activity and 30% increase in filter paper activity compared to parental SP4. BGL activity reached 8.3 U/mL. \n- Glucose yield in saccharification of delignined corncob residues was 65% higher in SPB2 than SP4, and exceeded RUT-C30 performance (61.0% vs 44.4% cellulose conversion). \n- Multiple cbh1 promoter copies caused a titration effect on transcriptional regulators, slightly reducing CBH activity in SPB2.", "description": "Characterization and strain improvement of a hypercellulytic variant T. reesei SN1 by genetic engineering for optimized cellulase production. Identified and characterized a novel hypercellulolytic T. reesei variant SN1 with nearly 2× higher endoglucanase activity than QM9414 and RUT-C30 but low β-glucosidase activity. Constructed a uracil auxotrophic platform strain SP4 by targeted pyr4 deletion via homologous recombination, then overexpressed the native bgl1 gene under a strong artificial 4-copy cbh1 promoter by co-transformation with an A. niger pyrG selectable marker. Best result: Top transformant SPB2 (4 additional bgl1 copies) achieved 17.1-fold higher BGL activity and 65% higher glucose yield from delignined corncob residues than SP4, surpassing RUT-C30 (61.0% vs 44.4% cellulose conversion), demonstrating that targeted BGL supplementation in a high-EG background dramatically improves overall saccharification efficiency."}, {"id": 33, "year": 2016, "title": "Functional characterization of the native swollenin from Trichoderma reesei: study of its possible role as C1 factor of enzymatic lignocellulose conversion", "doi": "https://doi.org/10.1186/s13068-016-0590-2", "species": "Trichoderma reesei", "strain": "QM9414 Δxyr1", "target": "SWO1", "strategy": "Homologous overexpression", "promoter": "cdna1", "signal_peptide": "native", "yield": "4", "units": "mg/L", "key_results": "- SWO1 yield of ~4 mg/L from bioreactor culture. SWO1 showed 120-fold and 20-fold higher binding specificity for xylan and lignin respectively over Avicel PH-101. \n- No amorphogenesis activity on pure crystalline or amorphous celluloses by WAXS or AFM. \n- Single-molecule AFM confirmed SWO1 binding to cellulose nanocrystals without structural disruption. \n- No synergy with T. reesei cellulases on pure cellulosic substrates. \n- A 1.5-fold boost in sugar release from untreated native grass (Dactylis glomerata) was observed. \n- Weak intrinsic hydrolase activity detected on barley β-glucan and cellotetraose.", "description": "Functional characterization of the native swollenin from Trichoderma reesei: study of its possible role as C1 factor of enzymatic lignocellulose conversion. Overexpressed native swo1 under the cdna1 promoter in a T. reesei QM9414 Δxyr1 background to obtain a clean, native-like recombinant SWO1 free of cellulase/hemicellulase contamination. SWO1 was purified by single-step Avicel PH-101 affinity chromatography from 2-L bioreactor cultures at ~4 mg/L and confirmed as heavily N- and O-glycosylated and properly folded by CD spectroscopy. Adsorption isotherms showed SWO1 binds xylan and lignin with 120-fold and 20-fold higher specificity than crystalline cellulose. Despite cellulose binding confirmed at single-molecule resolution by AFM, SWO1 caused no amorphogenesis of crystalline or amorphous cellulose and showed no synergy with T. reesei cellulases on pure cellulosic substrates. A modest 1.5-fold improvement in sugar release from intact, untreated native grass was observed, suggesting limited auxiliary activity on complex lignocellulose."}, {"id": 34, "year": 2016, "title": "Genome wide analysis of protein production load in Trichoderma reesei", "doi": "https://doi.org/10.1186/s13068-016-0547-5", "species": "Trichoderma reesei", "strain": "LipPr4d, CutCBHd, Cel4d (cellulase deletion)", "target": "Dipodascus capitatus lipase (LipPr4d), Coprinus cinerea cutinase (CutCBHd), native cellulase secretome (Cel4dCt)", "strategy": "Heterologous expression + host engineering (cellulase gene deletions, protease deletions, cbh1 locus replacement)", "promoter": "cbh1", "signal_peptide": "CBH1 (lipase); native (cutinase)", "yield": "", "units": "", "key_results": "- Carbon source concentration identified as primary transcriptome determinant; 1600+ genes correlated to biomass/cellobiose. \n- ER secretion factors (bip1, pdi1, cnx1) induced with protein production, putatively Xyr1-regulated; no hac1 splicing detected.\n- Sulphur assimilation and cysteine/methionine metabolism flagged as novel limiting factors via correlated gene expression and flux modelling. \n- Stoichiometric model predicted protein production rate (r=0.51). \n- Novel metabolites detected: cellotriose-like trisaccharide, glycerol, and transient ethanol in cutinase strains.", "description": "Genome wide analysis of protein production load in Trichoderma reesei. Compared six T. reesei strains varying in protein production load — including a cellulase quadruple deletion, a Dipodascus capitatus lipase producer, a Coprinus cinerea cutinase producer, and matched controls — in triplicate bioreactors on cellobiose minimal medium, combining RNA-seq transcriptomics with the first genome-wide stoichiometric flux balance model for T. reesei. Best result: Carbon source concentration was the dominant transcriptome determinant; ER secretion genes were induced under high protein production in a putative Xyr1-dependent manner without triggering UPR; and flux modelling identified sulphur assimilation and cysteine/methionine metabolism as novel limiting factors for protein production."}, {"id": 35, "year": 2016, "title": "Enabling low cost biopharmaceuticals: high level interferon alpha-2b production in Trichoderma reesei", "doi": "https://doi.org/10.1186/s12934-016-0508-5", "species": "Trichoderma reesei", "strain": "M674", "target": "IFNα-2b (Interferon alpha-2b)", "strategy": "Host engineering — sequential multiplex protease gene deletion (9 genes) + CBH1 carrier fusion expression strategy + kex2 overexpression", "promoter": "cbh1", "signal_peptide": "CBH1 (carrier fusion with NVISKR KEX2 cleavage site)", "yield": "4.5", "units": "g/L", "key_results": "- M674 (Δamp2) reached 2.4 g/L free IFNα-2b in bioreactor without inhibitor; M673 (Δslp7) reached 2.1 g/L. \n- With SBTI addition to M674, free IFNα-2b reached 4.5 g/L with an additional 1.8 g/L still carrier-bound (total ~6.3 g/L). \n- Sandwich ELISA confirmed natively folded IFNα-2b at 2.4 g/L. \n- Other deletions (Δsep1, Δpep9) gave 1.4 and 1.0 g/L respectively. \n- Growth of best production strains comparable to parental M577. \n- First report of interferon production in T. reesei, competing with E. coli inclusion body refolding yields.", "description": "Enabling low cost biopharmaceuticals: high level interferon alpha-2b production in Trichoderma reesei. Built on a previously developed 7-protease deletion strain by adding deletion of pep5 (giving M504), then integrating a codon-optimized IFNα-2b expression cassette as a CBH1 carrier fusion under the cbh1 promoter with a NVISKR KEX2 cleavage site at the cbh1 locus. A series of 9th protease deletions were screened from the resulting strain M577. Best result: the Δamp2 strain M674 produced 2.4 g/L free IFNα-2b in bioreactor without inhibitor, rising to 4.5 g/L with SBTI addition (plus 1.8 g/L carrier-bound), with natively folded protein confirmed by sandwich ELISA — the first reported interferon production in T. reesei and among the highest secreted therapeutic protein yields reported in a filamentous fungus at the time."}, {"id": 36, "year": 2017, "title": "\nA versatile 2A peptide-based bicistronic protein expressing platform for the industrial cellulase producing fungus, Trichoderma reesei", "doi": "https://doi.org/10.1186/s13068-017-0710-7", "species": "Trichoderma reesei", "strain": "AST1116", "target": "cel7A (native),\neGFP", "strategy": "2A peptide bicistronic expression + co-expression engineering", "promoter": "eno", "signal_peptide": "native", "yield": "", "units": "", "key_results": "- Cel7A + eGFP: C2G orientation preserved both Cel7A activity and eGFP fluorescence; eGFP fluorescence directly correlated with Cel7A expression across transformants, validating it as a screening marker. - Cel7A activity toward pretreated corn stover was unaffected by its orientation. \n- G2C orientation failed — addition of 21 amino acids to eGFP C-terminus severely reduced fluorescence and could not be linked to Cel7A expression. \n- Demonstrates feasibility of equimolar co-expression of two proteins from a single transcript in T. reesei.", "description": "A versatile 2A peptide-based bicistronic expression platform in T. reesei. Adapted the FMDV 2A ribosomal skipping peptide to co-express two proteins from a single transcript in T. reesei, using Cel7A and eGFP as the test pair. The key innovation is using eGFP fluorescence as a rapid proxy to identify transformants with high Cel7A expression — bypassing the slow, tedious PCR/western blot screening normally required. The C2G orientation (Cel7A-2A-eGFP) worked well with eGFP fluorescence directly correlating with Cel7A activity. The G2C orientation failed due to instability of the modified eGFP. Establishes a foundation for multi-protein expression from a single polycistronic cassette in T. reesei."}, {"id": 37, "year": 2017, "title": "Scaling up and scaling down the production of galactaric acid from pectin using Trichoderma reesei", "doi": "https://doi.org/10.1186/s12934-017-0736-3", "species": "Trichoderma reesei", "strain": "VTT D-161646", "target": "UDH ", "strategy": "Heterologous expression + host pathway engineering", "promoter": "gpdA, cbh1, cDNA1, pdc1", "signal_peptide": "", "yield": "21", "units": "g/L", "key_results": "- Best yield: 21 g/L at 10 L scale (Sigma pectin, yield 1.11 g/g d-galacturonate). \n- 1 L scale (Meridianstar pectin): 18 g/L, yield 1.00 g/g. - 250 L scale: 14 g/L, yield 0.77 g/g — yield drop attributed to galactaric acid crystals trapped in biomass filter cake during DSP. \n- 2.81 kg galactaric acid recovered from 250 L run (73% recovery). \n- 24-well plate format (4 mL) produced up to 11 g/L — validated as a useful strain screening tool but not a substitute for bioreactor optimisation. \n- cbh1 promoter gave slightly higher galactaric acid titres than gpdA, cDNA1, or pdc1 in 24-well plates from pure d-galacturonate; differences disappeared with pectin substrate.", "description": "Scaling up and scaling down the production of galactaric acid from pectin using T. reesei. Engineered T. reesei QM6a by deleting gar1 (native d-galacturonic acid reductase) and expressing A. tumefaciens UDH (uronate dehydrogenase) under the gpdA promoter, forcing d-galacturonic acid flux toward galactaric acid. Replaced pure d-galacturonic acid with food-grade pectin as a low-cost substrate, requiring exogenous pectinase addition since T. reesei lacks native pectinolytic activity. Demonstrated scalability from 4 mL 24-well plates up to 250 L bioreactor. Best result: 21 g/L galactaric acid at 10 L scale (yield 1.11 g/g d-galacturonate); 2.81 kg recovered from the 250 L run, with yield loss at large scale attributed to galactaric acid crystals trapped in filter-press biomass, highlighting the need for biomass extraction in DSP before commercialisation."}, {"id": 38, "year": 2017, "title": "Production of highly efficient cellulase mixtures by genetically exploiting the potentials of Trichoderma reesei endogenous cellulases for hydrolysis of corncob residues", "doi": "https://doi.org/10.1186/s12934-017-0825-3", "species": "Trichoderma reesei", "strain": "QP4", "target": "CBH2, EG2, BGL1", "strategy": "Multi-gene overexpression + pyrG marker recycling", "promoter": "cbh1", "signal_peptide": "native", "yield": "", "units": "", "key_results": "- CBH2 overexpression (QPC67): 32-fold increase in cbh2 transcript, CBH2 protein reached level of CBH1, but FPA increased only 18% — no significant improvement in ACR or DCR saccharification vs QP4. \n- EG2 overexpression (QPE36): 46-fold increase in egl2 transcript; FPA reached 5.8 U/mL (1.5× QP4 at 2.3 U/mL); EG activity +57.8%, CBH activity +1.5×; ACR cellulose conversion improved from 20.0% to 41.7%; DCR from 33.4% to 73.4%. \n- pyrG marker successfully excised in QE51 via 5-FOA (frequency 10⁻³–10⁻⁴); cellulase activity unaffected. \n- EG2+BGL1 double overexpression (QEB4): BGL activity 11.6× higher than QE51 and 24.8× higher than QP4; DCR saccharification reached 94.2% cellulose conversion after 48h; ACR conversion 48.2%. \n- EG2 identified as the key limiting component; CBH2 ratio not critical for efficient hydrolysis of these substrates.", "description": "Production of highly efficient cellulase mixtures by genetically exploiting the potentials of T. reesei endogenous cellulases for hydrolysis of corncob residues. Sequentially overexpressed CBH2, EG2, and BGL1 in hypercellulolytic strain QP4 using a pyrG marker recycling strategy to optimize the native enzyme cocktail. CBH2 overexpression had negligible impact on saccharification, while EG2 overexpression drove a 1.5-fold FPA increase and more than doubled cellulose conversion on both corncob substrates — identifying EG2 as the key limiting component. Best result: EG2+BGL1 double overexpression strain QEB4 achieved 94.2% cellulose conversion of delignified corncob residues after 48h enzymatic saccharification."}, {"id": 39, "year": 2017, "title": "Development of a low-cost cellulase production process using Trichoderma reesei for Brazilian biorefineries", "doi": "https://doi.org/10.1186/s13068-017-0717-0", "species": "Trichoderma reesei", "strain": "M44 (parental); VTT-BR-C0019, VTT-BR-C0020, VTT-BR-C0022 (engineered derivatives)", "target": "XYR1_V821F (transcription factor); TeCel3A β-glucosidase (Talaromyces emersonii); Suc1 invertase (Aspergillus niger)", "strategy": "Transcription factor engineering + heterologous β-glucosidase expression + heterologous invertase expression", "promoter": "pdc1 (XYR1_V821F, ace2); xyn1 (TeCel3A); native A. niger suc1 promoter (invertase)", "signal_peptide": "native", "yield": "37.3", "units": "g/L", "key_results": "- Soybean hulls alone induced 23.5 g/L extracellular protein vs. 26.6 g/L on optimized Avicel/lactose medium; sugarcane bagasse and molasses gave poor results with parental strain. \n- VTT-BR-C0019: secreted enzymes on glucose (14.5 U/mg EG, 170 U/mg xylanase); xylanolytic activities strongly enriched vs. M44. \n- VTT-BR-C0020: up to 146 U/mL total β-glucosidase (8 U/mg specific) added; ~400× increase vs. parental; 30.8 g/L total protein in bioreactor on soybean hulls + molasses feed (120h, 0.26 g/L·h). \n- VTT-BR-C0022: consumed all sucrose in molasses directly; reached 34.1 g/L on molasses alone (214h) and 37.3 g/L on molasses + soybean hulls (183h, 0.20 g/L·h). \n- Hydrolysis: >80% cellulose and >90% xylan conversion in 72h at 10 mg/g dry substrate; 80% reduction in enzyme loading vs. parental strain. \n- SSF: 60–80% theoretical ethanol yield achieved using whole unprocessed enzyme broth.", "description": "Development of a low-cost cellulase production process using Trichoderma reesei for Brazilian biorefineries. Engineered a T. reesei production strain through three sequential modifications — XYR1_V821F overexpression for glucose-derepressed cellulase production, heterologous β-glucosidase from Talaromyces emersonii to boost hydrolysis performance, and A. niger invertase to enable direct sucrose utilization from sugarcane molasses. Combined with soybean hulls as the primary low-cost carbon source, the final strain achieved industrially relevant enzyme titers and hydrolys
