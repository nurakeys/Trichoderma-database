: "native", "yield": "", "units": "", "key_results": "- Azf1 overexpression is inducer-dependent — Azf1 protein is present in glucose but cannot activate cellulase expression, suggesting posttranslational regulation. \n- On cellulose, OEazf1 upregulates intracellular β-glucosidases cel1a, cel1b, and cel3g early in cultivation, increasing intracellular β-glucosidase activity; this accelerates cellobiose/sophorose hydrolysis, triggering premature CCR and repressing cellulase genes and xyr1. \n- In long-term cultivation (72–96 h), azf1 overexpression overcomes CCR and increases CMCase activity on cellulose and cellobiohydrolase activity on sugarcane bagasse.", "description": "Overexpression of the Transcription Factor Azf1 Reveals Novel Regulatory Functions and Impacts β-Glucosidase Production in Trichoderma reesei. Overexpressed the novel Cys2His2 zinc finger transcription factor Azf1 in T. reesei QM9414 using the constitutive Pcdna1 promoter to investigate its role in cellulase regulation. Despite elevated Azf1 protein levels, overexpression did not activate cellulase genes in glucose, indicating inducer-dependent posttranslational regulation. In cellulose, OEazf1 upregulated intracellular β-glucosidases cel1a, cel1b, and cel3g early in cultivation, increasing intracellular β-glucosidase activity and accelerating cellobiose/sophorose hydrolysis — triggering premature CCR and repressing cellulase genes and xyr1. However, in long-term cultivation (72–96 h), azf1 overexpression overcame CCR and increased CMCase activity on cellulose and cellobiohydrolase activity on sugarcane bagasse."}, {"id": 83, "year": 2023, "title": "The Cerato-Platanin EPL2 from Trichoderma reesei Is Not Directly Involved in Cellulase Formation but in Cell Wall Remodeling", "doi": "https://doi.org/10.3390/microorganisms11081965", "species": "Trichoderma reesei", "strain": "Δepl2", "target": "EPL2", "strategy": "Gene deletion + transcriptomics", "promoter": "", "signal_peptide": "", "yield": "", "units": "", "key_results": "- Δepl2 showed upregulation of oxidative stress, oxidoreductase, antioxidant, and transport genes on cellulose. \n- Nine CAZy genes were upregulated including a candidate β-1,3-1,4-glucanase (10.54 log2FC).\n- Cellulase gene transcription was altered but enzyme activity was unchanged, indicating EPL2 does not directly regulate cellulase production. \n- Δepl2 accumulated more chitin oligomers, N-acetylglucosamine, and glucose in the cell wall, showed increased cell wall thickness (0.35 vs 0.27 μm), and was more tolerant to CFW and Congo Red stressors — establishing EPL2 as a cell wall remodeling factor in T. reesei.", "description": "Deletion of the cerato-platanin gene epl2 in T. reesei reveals its role in cell wall remodeling rather than cellulase regulation. Deleted epl2 (Trire2_123955) in the QM6a∆tmus53∆pyr4 background by replacing the ORF with pyr4 and performed comparative RNA-seq on Δepl2 vs WT grown on cellulose. Despite transcriptional changes in several cellulase genes, no significant differences in cellulolytic enzyme activity were detected, indicating EPL2 does not directly regulate cellulase formation. Instead, Δepl2 showed increased cell wall thickness, higher chitin and glucan content, tolerance to Calcofluor White and Congo Red stressors, and upregulation of cell wall remodeling genes — consistent with a compensatory response to EPL2 absence. Nine CAZy genes were upregulated including a candidate β-1,3-1,4-glucanase with the highest fold change (10.54 log2FC). Results establish EPL2 as a key regulator of cell wall integrity and remodeling in T. reesei."}, {"id": 84, "year": 2023, "title": "The ERAD Pathway Participates in Fungal Growth and Cellulase Secretion in Trichoderma reesei", "doi": "https://doi.org/10.3390/jof9010074", "species": "Trichoderma reesei", "strain": "Δhrd1, Δhrd3, Δder1", "target": "EG1, EG2, CBH1, BGL1", "strategy": "Gene deletion / secretory pathway engineering", "promoter": "native", "signal_peptide": "native", "yield": "", "units": "", "key_results": "- Δhrd1 and Δhrd3 showed severely impaired growth under high DTT-induced ER stress and reduced cell wall stability. \n- Δhrd3 and Δder1 showed reduced heat tolerance at 37°C. \n- All three mutants showed decreased CBH and BGL1 secretion (BGL activity reduced to 26–33% of parental on day 7) with no significant effect on EG secretion. \n- bgl1 transcription was strongly downregulated (15–35% of parental), attributed to RESS pathway activation. \n- cbh1 transcription was unchanged despite reduced CBH activity.", "description": "The ERAD Pathway Participates in Fungal Growth and Cellulase Secretion in Trichoderma reesei. Knocked out three key ERAD components (hrd1, hrd3, der1) individually in T. reesei QM9414 to investigate their roles in fungal stress tolerance and native cellulase secretion. Under elevated ER stress, Δhrd1 and Δhrd3 showed severely impaired growth and reduced cell wall stability, while Δhrd3 and Δder1 exhibited reduced heat tolerance. During cellulase fermentation, all three mutants showed decreased CBH and BGL1 secretion with BGL1 activity falling to 26–33% of the parental strain, while endoglucanase secretion was unaffected. The bgl1 reduction was linked to transcriptional downregulation via the RESS feedback mechanism, while reduced CBH secretion despite unchanged cbh1 transcript levels suggested selective protein degradation by residual ERAD activity."}, {"id": 85, "year": 2024, "title": "Enhanced heterologous gene expression in Trichoderma reesei by promoting multicopy integration", "doi": "https://doi.org/10.1007/s00253-024-13308-x", "species": "Trichoderma reesei", "strain": "Cl847", "target": "eGFP (Enhanced Green Fluorescent Protein)", "strategy": "Multicopy integration engineering + genome engineering", "promoter": "tef1", "signal_peptide": "N/A \n(reporter protein)", "yield": "N/A\n(relative fluorescence)", "units": "", "key_results": "- Gene copy number correlates positively with EGFP fluorescence; multicopy integration significantly enhances heterologous gene expression in T. reesei; integration site affects expression level.", "description": "Enhanced heterologous gene expression in T. reesei by promoting multicopy integration. Investigated why transformants expressing eGFP under the tef1 promoter showed widely varying fluorescence levels. Used Illumina and Oxford Nanopore whole genome sequencing on 8 transformants to identify integration sites and copy numbers. Found that the circular expression plasmid consistently integrated at the same genomic locus — upstream of the tef1 gene — in all strains via homologous recombination, with 4–11 copies per strain. eGFP expression correlated positively with intact copy number. Concluded that using a tef1 promoter cassette without the tef1 terminator on a circular plasmid naturally promotes multicopy integration at the tef1 locus, providing a simple strategy to boost heterologous protein production without deliberate copy number engineering."}, {"id": 86, "year": 2024, "title": "Sub-genomic RNAi-assisted strain evolution of filamentous fungi for enhanced protein production", "doi": "https://doi.org/10.1128/aem.02082-23", "species": "Trichoderma reesei", "strain": "SUS4", "target": "endoglucanase\n(native)", "strategy": "RNAi engineering + strain evolution", "promoter": "cbh1", "signal_peptide": "native", "yield": "", "units": "", "key_results": "- Endoglucanase: Round 1 — SSH1(A23) and SSH1(G60) achieved 46.6 and 40.7 U/mL respectively (2.8–3.3× wild type of 10.8 U/mL), with novel regulatory genes tre49304 and tre120391 identified as inserts. \n- Round 2 (iterative) — SSH2(G16)[SSH1(A23)] achieved 75.6 U/mL, 7× wild type.\n- Knockout validation confirmed tre49304, tre120391, tre123541, and tre21982 as genuine negative regulators (2.4–3.0× improvement individually).", "description": "Sub-genomic RNAi-assisted strain evolution. Used SSH to enrich differentially expressed genes under cellulase-inducing vs -repressing conditions, then applied RNAi to silence subsets simultaneously. FACS-based screening using DsRed fluorescence identified improved strains. Achieved 75.6 U/mL endoglucanase after 2 iterative rounds (7× wild type). Identified novel negative regulators tre49304, tre120391, and tre123541. Strategy also validated in H. insolens for catalase production."}, {"id": 87, "year": 2024, "title": "Engineering of glycoside hydrolase family 7 cellobiohydrolases directed by natural diversity screening\n", "doi": "https://doi.org/10.1016/j.jbc.2024.105749", "species": "Trichoderma reesei", "strain": "AST1116", "target": "GH7 Cellobiohydrolases (57 natural CBHs and engineered PfCel7A variants)", "strategy": "Enzyme engineering + diversity-guided screening", "promoter": "eno", "signal_peptide": "cbh1", "yield": "", "units": "", "key_results": "- Successfully expressed 57 GH7 CBHs. \n- Identified 10 enhanced natural variants. \n- Best engineered PfCel7A triple mutant achieved 41% higher biomass conversion than wild-type PfCel7A, 55% higher than T. reesei Cel7A, and 10% higher than A. oryzae Cel7C.", "description": "Engineering of Glycoside Hydrolase Family 7 Cellobiohydrolases Directed by Natural Diversity Screening. Screened a diverse collection of fungal GH7 cellobiohydrolases by expressing them in a common T. reesei production platform using standardized expression and secretion signals. Identified naturally occurring GH7 variants with superior catalytic properties compared to native Cel7A and used sequence diversity to guide enzyme engineering. Showed that natural biodiversity is a powerful resource for discovering improved cellulases and established a workflow combining heterologous expression, screening, and protein engineering to develop enhanced biomass-degrading enzymes."}, {"id": 88, "year": 2024, "title": "Divergent roles of ADP-ribosylation factor GTPase-activating proteins in lignocellulose utilization of Trichoderma guizhouense NJAU4742", "doi": "https://doi.org/10.1186/s13068-024-02570-w", "species": "Trichoderma guizhouense", "strain": "OE-Tggcs1", "target": "TgGcs1, TgGlo3", "strategy": "Gene overexpression + functional/regulatory genomics", "promoter": "Histone H4 promoter", "signal_peptide": "", "yield": "", "units": "", "key_results": "- OE-Tggcs1 increased endoglucanase, xylanase, and filter paper activity by ~8–13% over WT on rice straw. \n- OE-Tgglo3 inhibited all lignocellulase activities. TgGcs1 overexpression enhanced intracellular glucose/cellobiose transport, increased vacuole volume, and upregulated key CAZyme genes. \n- TgGlo3 and TgGcs1 exert opposite effects via differential regulation of dynamin-like GTPase Tggtp. \n- ΔTggtp independently improved lignocellulase secretion and increased vacuolar vesicle formation at hyphal tips.", "description": "Divergent roles of Arf-GAP proteins TgGlo3 and TgGcs1 in lignocellulose utilization of T. guizhouense NJAU4742. Characterized two ADP-ribosylation factor GTPase-activating proteins in T. guizhouense NJAU4742 by generating overexpression strains (OE-Tgglo3, OE-Tggcs1) using a Histone H4 promoter, as TgGlo3 knockout was lethal. OE-Tggcs1 enhanced lignocellulase production (endoglucanase, xylanase, filter paper activity up ~8–13% over WT) on rice straw, while OE-Tgglo3 had the opposite effect. Mechanistically, TgGcs1 promoted intracellular glucose and cellobiose transport, increased vacuole volume, and upregulated CAZyme gene expression. Both proteins were found to differentially regulate a downstream dynamin-like GTPase (Tggtp), whose deletion (ΔTggtp) independently improved lignocellulase secretion — identifying Tggtp as a novel negative regulator of lignocellulase production in Trichoderma."}, {"id": 89, "year": 2024, "title": "The transcription factor STE12 influences growth on several carbon sources and production of dehydroacetic acid (DHAA) in Trichoderma reesei\n", "doi": "https://doi.org/10.1038/s41598-024-59511-8", "species": "Trichoderma reesei", "strain": "QM6a Δste12", "target": "STE12 transcription factor (native; deletion study)\n", "strategy": "Transcription factor engineering (gene deletion)", "promoter": "", "signal_peptide": "", "yield": "", "units": "", "key_results": "- Δste12 reduced cbh1 and cre1 transcript levels ~60% and ~40% in light but had no effect in darkness. \n- Δste12 showed better growth on multiple carbon sources (lactose, maltose, melibiose, glycerol, glycogen) at late timepoints. \n- STE12 regulates trichodimerol and DHAA production but not bisorbibutenolide. \n- 203 genes differentially regulated; enriched categories include CAZymes, ion transport, and secondary metabolism. \n- DHAA confirmed by NMR and MS as a novel T. reesei secondary metabolite regulated by STE12.", "description": "The transcription factor STE12 influences growth on several carbon sources and production of dehydroacetic acid (DHAA) in Trichoderma reesei. Deleted ste12 in T. reesei QM6a using hygromycin resistance cassette to investigate its role in cellulase regulation, carbon source utilization, and secondary metabolism. Deletion reduced cbh1 and cre1 transcripts ~60% and ~40% specifically in light, with no effect in darkness, indicating light-dependent positive regulation of cellulase genes by STE12. Δste12 grew better than wild-type on multiple carbon sources including lactose, maltose, melibiose, and glycerol at late cultivation timepoints. Transcriptome analysis identified 203 STE12-regulated genes enriched in CAZymes, ion transport, and secondary metabolism. STE12 selectively regulates trichodimerol production and is required for biosynthesis of dehydroacetic acid (DHAA), here first confirmed in T. reesei by NMR and MS, while bisorbibutenolide production was unaffected."}, {"id": 90, "year": 2024, "title": "Evolution and screening of Trichoderma reesei mutants for secreted protein production at elevated temperature", "doi": "https://doi.org/10.1093/jimb/kuae038", "species": "Trichoderma reesei", "strain": "T4abcGEF1", "target": "CBH1, CBH2, EG1, EG2", "strategy": "Strain evolution (droplet-based NTG mutagenesis) + gene deletion (gef1)", "promoter": "cbh1", "signal_peptide": "native", "yield": "", "units": "", "key_results": "- nik1M743T mutation responsible for lowering optimal protein secretion temperature from 28°C to 25°C in T4abc vs. RL-P37. \n- T4abc E1 produced >22% more total secreted protein at 28°C and >14% more at 31°C vs. T4abc parent. \n- T4abcGEF1 showed equivalent productivity to T4abc E1 at 28°C, confirming gef1 as causative. \n- T4abcGEF1 maintained productivity from 25–28°C; sharp ~40% drop at 29–30°C. \n- Specific productivity of T4abcGEF1 at 28°C matched T4abc at its optimal 25°C. \n- gef1 effect is epistatic to nik1M743T; in nik1 wild-type background, gef1 deletion does not raise optimal temperature above RL-P37 baseline.", "description": "Evolution and screening of Trichoderma reesei mutants for secreted protein production at elevated temperature. Used droplet-based NTG mutagenesis and 11 rounds of serial evolution at 31°C to isolate T4abc E1, a high-temperature cellulase-producing mutant of the industrial strain T4abc, then traced the causative mutation to a premature stop codon in gef1, encoding a Rho-type guanine exchange factor. gef1 was subsequently deleted by Cas9-mediated insertion to generate the engineered strain T4abcGEF1. Best result: gef1 deletion restored the optimal protein secretion temperature from 25°C to 28°C in the nik1M743T background, with T4abcGEF1 achieving specific productivity at 28°C equivalent to parental T4abc at its optimal 25°C — demonstrating that gef1 inactivation raises the production temperature without loss of productivity."}, {"id": 91, "year": 2024, "title": "Genomic Characterization and Establishment of a Genetic Manipulation System for Trichoderma sp. (Harzianum Clade) LZ117", "doi": "https://doi.org/10.3390/jof10100697", "species": "Trichoderma sp. LZ117", "strain": "OE-Cre1-5, OE-Cre1-9, OEMal1-6, OEMal1-8, OEMal1-11", "target": "Cre1, Mal1, native cellulase secretome", "strategy": "Transcription factor overexpression (Cre1) + transporter overexpression (Mal1) + PEG-mediated protoplast transformation platform development", "promoter": "cbh1", "signal_peptide": "", "yield": "", "units": "", "key_results": "- Mal1 overexpression had no significant effect on cellulase production under glucose or lactose seed conditions, suggesting basal Mal1 levels are sufficient. \n- Cre1 overexpression dramatically reduced cellulase production vs. wildtype LZ117, confirming Cre1-mediated CCR as a key regulator in this strain. \n- Wildtype LZ117 cellulase production was comparable to T. reesei Rut-C30 and superior to QM9414. \n- Lactose as seed carbon source increased cellulase activity ~60% vs. glucose, confirming CCR impact on induction.", "description": "Genomic Characterization and Establishment of a Genetic Manipulation System for Trichoderma sp. (Harzianum Clade) LZ117. Reclassified the superior cellulase-producing strain T. harzianum LZ117 as a new species closely related to T. atrobrunneum via multilocus phylogenetics and time-scaled phylogenomics, then established PEG-mediated protoplast transformation as a genetic manipulation platform. Overexpression of the native Cre1 homolog and maltose permease Mal1 under the cbh1 promoter were used to probe regulatory mechanisms of cellulase production. Best result: Cre1 overexpression dramatically suppressed cellulase production, confirming Cre1-mediated CCR as a key regulatory bottleneck in LZ117, while Mal1 overexpression had no effect — establishing that LZ117's natural high cellulase output (comparable to T. reesei Rut-C30) is partly attributable to low endogenous Cre1 expression."}, {"id": 92, "year": 2025, "title": "A metagenomic ‘dark matter’ enzyme catalyses oxidative cellulose conversion", "doi": "https://doi.org/10.1038/s41586-024-08553-z", "species": "Trichoderma reesei", "strain": "Br_TrR03", "target": "CelOCE", "strategy": "Metagenomic mining; CRISPR-Cas9 markerless integration into xyn4 locus; pilot bioreactor scale-up.", "promoter": "Custom expression promoter", "signal_peptide": "xyn4", "yield": "", "units": "", "key_results": "- Discovered CelOCE as a strict C1-regioselective, exo-type peroxygenase that cleaves cellulose into cellobionic acid. \n- Operates via a back-to-back homodimer where one subunit generates co-substrate H2O2 in situ while the other simultaneously cleaves the chain, working synergistically with endoglucanases. \n- CRISPR-Cas9 expression in T. reesei drove a 21% and 19% increase in total glucose release from pretreated sugarcane bagasse and eucalyptus under industrial conditions. \n- Scaled up successfully in 65-L and 300-L bioreactors on low-cost molasses. ", "description": "A metagenomic 'dark matter' enzyme catalyses oxidative cellulose conversion. Engineered Trichoderma reesei Br_TrR03 using CRISPR-Cas9 to integrate a novel metagenomic copper peroxygenase (CelOCE) into the xyn4 locus. Co-expressed this enzyme alongside native cellulolytic systems to assess high-solids saccharification performance. Best result: CelOCE functions as a self-sufficient homodimer achieving in situ H2O2 generation for C1-regioselective exo-cleavage, driving a 21% and 19% increase in total glucose release from pretreated sugarcane bagasse and eucalyptus under industrial high-solids (>15%) conditions in 65-L and 300-L pilot bioreactors."}, {"id": 93, "year": 2025, "title": "Metabolic Engineering of Filamentous Fungus Trichoderma reesei for Itaconic Acid Production\n", "doi": "https://doi.org/10.1021/acs.jafc.4c10107", "species": "Trichoderma reesei", "strain": "QM6a", "target": "CadA, MttA ", "strategy": "Metabolic pathway engineering / Sequential heterologous gene overexpression", "promoter": "pdc1", "signal_peptide": "", "yield": "93.5", "units": "g/L", "key_results": "- Co-expressing A. terreus cadA and mttA initiated IA production at 21.57 g/L. \n- Multiplexed overexpression of native transporters (mfsa1, mfsa2, mfsa5) and precursor genes (cit, aco2) optimized flux to hit 65.61 g/L in shake flasks. \n- Deleting competitive pathway gene cyp3 prevented acid degradation, while ypr1 deletion eliminated yellow pigment contaminants. \n- Final morphology engineering via gul1 deletion dropped broth viscosity, enabling a maximum fed-batch bioreactor titer of 93.5 g/L with a conversion efficiency of 0.62 g/g glucose.", "description": "Metabolic Engineering of Filamentous Fungus Trichoderma reesei for Itaconic Acid Production. Engineered Trichoderma reesei QM6a using metabolic pathway engineering / sequential heterologous gene overexpression by expressing Aspergillus terreus genes cadA and mttA under strong constitutive promoters, sequentially multiplexing native mfsa efflux transporters, overexpressing central cit and aco2 precursor nodes, and applying targeted gene deletions (Δcyp3, Δypr1, Δgul1). Best result: Reconstructing central carbon flux while modifying mycelial morphology to lower fermentation broth viscosity drove a peak itaconic acid production yield of 93.5 g/L inside a 1 L fed-batch bioreactor."}, {"id": 94, "year": 2025, "title": "An l-fucose-responsive transcription factor cross-regulates the expression of a diverse array of carbohydrate-active enzymes in Trichoderma reesei", "doi": "https://doi.org/10.1371/journal.pgen.1011815", "species": "Trichoderma reesei", "strain": "QMP", "target": "FUR1 transcription factor; α-l-fucosidases Afc95A and Afc95B; FDH1 (l-fucose dehydrogenase); broad CAZyme secretome", "strategy": "Transcription factor engineering (gene deletion + constitutively active gain-of-function mutant)", "promoter": "cdna1", "signal_peptide": "native", "yield": "", "units": "", "key_results": "- Δfur1 abolished growth on l-fucose as sole carbon source; FUR1 is essential for l-fucose utilisation and regulates fdh1, lgd1, lga1, all four α-l-fucosidase genes, and a broad CAZyme array.\n- fur1-M secretome showed 0.7–3.8× higher β-glucuronidase, α-galactosidase, β-xylosidase, and α-mannosidase activities vs QMP on microcrystalline cellulose, with 14 proteins exclusively detected in fur1-M.\n- fur1-M enzymes released 0.41 g/L galactose from orange peel vs none for QMP, attributed to α-l-fucosidase-mediated removal of capping l-fucose residues.\n- FUR1 and XYR1 govern largely distinct regulons (only 11/319 FUR1-activated genes overlap with XYR1 targets); signal discrimination mapped to XYR1 residues 579–668 via chimeric TF engineering.", "description": "An l-fucose-responsive transcription factor cross-regulates the expression of a diverse array of carbohydrate-active enzymes in T. reesei. Identified FUR1, an XYR1 paralogue, as the master transcriptional regulator of l-fucose catabolism and a broad array of biomass-degrading enzymes in T. reesei. Generated Δfur1 deletion and a constitutively active fur1-M mutant (I757F/S760V) to characterise FUR1's regulon, which encompasses l-fucose catabolic genes, all four α-l-fucosidase genes, and diverse additional CAZymes targeting β-glucuronidic, α-galactosidic, and β-xylosidic linkages. FUR1 and XYR1 govern largely distinct regulons despite sequence similarity, with signal discrimination mapped to a defined C-terminal region via CRISPR/Cas9 chimeric TF engineering. Best result: fur1-M secretome showed 0.7–3.8× higher accessory enzyme activities on microcrystalline cellulose and released galactose from orange peel that was completely absent in parental strain enzymes — demonstrating FUR1 engineering as a strategy to broaden secretome diversity and improve complex biomass saccharification without media modification."}, {"id": 95, "year": 2025, "title": "Rme1: Unveiling a Novel Repressor in the Cellulolytic Pathway of Trichoderma reesei", "doi": "https://doi.org/10.3390/jof11090658", "species": "Trichoderma reesei", "strain": "QM6a∆tmus53∆pyr4 (Δrme1)", "target": "CAZyme secretome (native)", "strategy": "Transcription factor engineering (gene deletion) + functional genomics", "promoter": "", "signal_peptide": "native", "yield": "", "units": "", "key_results": "- Δrme1 significantly upregulates cel7a, cel6a, cel1a, cel5a, cel3b, xyn2, and sugar transporter Tr69957 specifically under cellulose-inducing conditions; no effect on glucose or glycerol.\n- cre1 expression is reduced in Δrme1 under all carbon sources tested, while xyr1 is unaffected — establishing Rme1 as the first TF reported to directly regulate cre1.\n- Δrme1 shows increased β-glucosidase and cellobiohydrolase enzymatic activities on cellulose.\n- EMSA confirmed direct binding of recombinant Rme1 to the promoters of cel7a and cre1 at 1.6 µM; no binding observed to the negative control swo promoter.\n- Δrme1 displays delayed conidiation and altered pigmentation; grows better on xylose than WT, attributed to upregulation of the xylose/cellobiose/mannose transporter Tr69957.", "description": "Rme1: Unveiling a Novel Repressor in the Cellulolytic Pathway of Trichoderma reesei. Identified and characterized Rme1 (TRIREDRAFT_27649), a novel C2H2 zinc finger transcription factor in T. reesei, through RNA-Seq motif analysis and functional genomics. The rme1 knockout was constructed in QM6a∆tmus53∆pyr4 using pyr4-mediated protoplast transformation. Deletion of rme1 significantly upregulated major cellulolytic genes — including cel7a, cel6a, cel5a, cel1a, cel3b, and xyn2 — specifically under cellulose-inducing conditions, and increased both β-glucosidase and cellobiohydrolase activities. Expression of cre1 was reduced in Δrme1 across all carbon sources tested, while xyr1 was unaffected, establishing Rme1 as the first transcription factor reported to directly regulate cre1. EMSA confirmed direct binding of recombinant Rme1:GST to the promoters of cel7a and cre1. Rme1 is proposed as a new target for promoter and transcription factor engineering to enhance cellulase production in T. reesei."}, {"id": 96, "year": 2025, "title": "Label-free analytical characterization of brazzein produced with the filamentous fungus Trichoderma reesei", "doi": "https://doi.org/10.3389/fbioe.2025.1688495", "species": "Trichoderma reesei", "strain": "M3728,  M3730", "target": "Brazzein", "strategy": "Heterologous expression + signal peptide engineering + synthetic expression system (SES)", "promoter": "SES synthetic promoter (pSWP3/pSWP4); cbh1 (pSWP10)", "signal_peptide": "HFBI (pSWP3); CBHI carrier (pSWP4/pSWP10)", "yield": "1.3", "units": "g/L", "key_results": "- Both SES and cbh1 promoter constructs produced brazzein in 24-well plate cultures; SES achieved ~1.3 g/L in 250-mL bioreactor — the highest reported brazzein yield at the time. \n- LC-HCMS confirmed correct amino acid sequence and N-terminal pyroglutamic acid modification. \n- CD spectroscopy, Timegated Raman spectroscopy, and DLS confirmed correct folding, intact disulfide bonds, and thermostability up to ~80°C. \n- Brazzein stored 24 months at 4–8°C retained 99.6% monomeric conformation.", "description": "Production of correctly folded sweet protein brazzein in T. reesei using synthetic expression system (SES) and cbh1 promoter. Expressed brazzein from Pentadiplandra brazzeana in a protease-deficient T. reesei M1908 strain (11 proteases deleted) using CRISPR/Cas9-targeted integration at egl1 and cbh1 loci. Both SES (CBHI carrier fusion) and cbh1 promoter constructs produced brazzein in 24-well cultures; the SES system achieved ~1.3 g/L in a 250-mL fed-batch bioreactor — the highest reported yield for brazzein at the time. LC-HCMS confirmed correct sequence and N-terminal pyroglutamic acid formation. CD spectroscopy and Timegated Raman spectroscopy confirmed intact secondary structure, correct disulfide bonding, and thermostability up to ~80°C. DLS of 24-month-stored material confirmed 99.6% monomeric conformation, demonstrating long-term stability of T. reesei-produced brazzein."}, {"id": 97, "year": 2026, "title": "Efficient Extracellular Production of Insulin Glargine in Trichoderma reesei by an Integrative Secretion-Based Strategy", "doi": "https://doi.org/10.1111/1751-7915.70318", "species": "Trichoderma reesei", "strain": "QP4", "target": "Insulin Glargine", "strategy": "Carrier fusion + signal peptide optimization + secretion engineering", "promoter": "Pcdna1", "signal_peptide": "Aspergillus niger β-glucoamylase", "yield": "58.95", "units": "mIU/L", "key_results": "- Replacing CBH1 SP1 with A. niger β-glucoamylase SP led to ~4-fold higher glargine secretion and further reduced stress.\n- Direct expression with Pcdna1 + SP1 yielded successful transcription but zero extracellular secretion, linked to ER stress\n- Bioreactor scale-up (1 L) with SGC1r achieved 144.75 mIU/L\n- Final optimized shake-flask process achieved 58.95 mIU/L extracellular glargine, demonstrating T. reesei’s potential as a host for secreted therapeutic recombinant proteins, including complex insulin analogs.", "description": "Efficient Extracellular Production of Insulin Glargine in T. reesei. Used CBH1 carrier fusion + Kex2p cleavage site to rescue secretion of insulin glargine, which failed to secrete directly due to ER stress. Screened signal peptides and identified A. niger β-glucoamylase SP (AnG) as optimal, giving 4× improvement. Final yield: 58.95 mIU/L shake-flask, 144.75 mIU/L bioreactor."}, {"id": 98, "year": 2026, "title": "Life on the rocks: unexpected enzyme activity of the extremophilic black fungus Knufia chersonesos", "doi": "https://doi.org/10.3389/fbioe.2025.1720118", "species": "Trichoderma reesei", "strain": "QM6a Δpyr4", "target": "Kc_Lip", "strategy": "Heterologous expression + signal peptide engineering", "promoter": "tef1", "signal_peptide": "CBH1", "yield": "", "units": "", "key_results": "Kc_Lip successfully expressed and secreted in T. reesei; activity on p-NPB increased from 33 U/L (wildtype) to 53 U/L (transformed strain). After 50× concentration, activity reached 576 U/L. Purified Kc_Lip released PBAT trimer BTaB but not monomeric terephthalic acid, indicating preference for aliphatic ester bonds. Kc_Cut (K. phaffii) hydrolyzed BTaB completely, confirming cooperative action between the two enzymes in PBAT depolymerization.", "description": "Heterologous expression of Knufia chersonesos lipase Kc_Lip in T. reesei for PBAT hydrolysis characterization. Kc_Lip, a secretory lipase identified via proteomics of PBAT-grown K. chersonesos, was expressed in T. reesei QM6a Δpyr4 (strain Lipex) after unsuccessful expression in K. phaffii. The gene was codon-optimized for T. reesei, fused to a CBH1 signal peptide and C-terminal StrepTag II, and placed under the constitutive tef1 promoter with targeted integration at the pyr4 locus. Secreted lipase activity increased from 33 U/L (wildtype) to 53 U/L in the transformed strain, reaching 576 U/L after 50× concentration. Purified Kc_Lip released the PBAT trimer BTaB but not monomeric terephthalic acid, while the companion cutinase Kc_Cut (expressed in K. phaffii) completely hydrolyzed BTaB — confirming cooperative depolymerization of PBAT by the two K. chersonesos enzymes."}, {"id": 99, "year": 2026, "title": "Engineering a Cold-Active Cellulase Complex with a Novel Mushroom Cellobiohydrolase for Efficient Biomass Saccharification and Juice Flavor Optimization", "doi": "https://doi.org/10.3390/jof12040276", "species": "Trichoderma reesei", "strain": "H2 (cbh1 locus replacement transformant)", "target": "VvCBHI-II", "strategy": "Heterologous expression + locus replacement (cbh1 locus)", "promoter": "cbh1", "signal_peptide": "native", "yield": "", "units": "", "key_results": "- VvCBHI-II successfully secreted at ~55 kDa; B3 loop replaced by β-sheet creates open active-site cleft with EG-like substrate specificity. \n- Purified VvCBHI-II showed highest specific activity on PASC (3.321 U/mg) — 15.2× TrCBHI — and on CMC-Na (0.234 U/mg); lower activity on crystalline Avicel than TrCBHI. \n- At 10°C, engineered cellulase complex showed 7.6–8.1× higher FPase activity than WT; 1.6–2.3× higher pNPCase activity. \n- Cold activity attributed to weakened hydrogen bonds (2.2–2.7 Å vs. 2.0–2.4 Å in TrCBHI) at product-binding subsites, accelerating cellobiose release. \n- H2 complex achieved 1.57× higher theoretical maximum glucose release from pear pomace at 10°C vs. WT. \n- Applied to pear juice processing: improved sweetness (0.55 vs. 0.34 CK), reduced bitterness and astringency aftertaste scores.", "description": "Engineering a Cold-Active Cellulase Complex with a Novel Mushroom Cellobiohydrolase for Efficient Biomass Saccharification and Juice Flavor Optimization. Engineered T. reesei Rut-C30 to produce a cold-active cellulase complex by replacing the endogenous cbh1 locus with a codon-optimized GH7 cellobiohydrolase, VvCBHI-II, mined from the cold-stress-induced glycoside hydrolase system of Volvariella volvacea. Integration was performed via Agrobacterium-mediated transformation with site-specific homologous recombination. Structural modeling revealed that a B3 loop truncation replaced by a β-sheet creates a wider, more open active-site cleft compared to TrCBHI, conferring endoglucanase-like substrate flexibility and weaker product hydrogen bonding (2.2–2.7 Å vs. 2.0–2.4 Å), which facilitates faster cellobiose release and alleviates cold-induced product inhibition. Best result: At 10°C, the engineered cellulase complex achieved an 8.1-fold increase in filter paper activity over wild-type, a 1.57× higher theoretical glucose release from pear pomace, and significantly improved juice sweetness while reducing bitterness and astringency aftertastes in simulated pear juice processing."}];

function simplifyStrategy(s) {
  if(!s) return "Other";
  const sl = s.toLowerCase();
  if(sl.includes("crispr")) return "CRISPR/Cas9";
  if(sl.includes("transcription factor") || sl.includes("tf engineering")) return "Transcription factor engineering";
  if(sl.includes("metabolic")) return "Metabolic engineering";
  if(sl.includes("heterologous expression")) return "Heterologous expression";
  if(sl.includes("promoter")) return "Promoter engineering";
  if(sl.includes("host engineering") || sl.includes("protease")) return "Host engineering";
  if(sl.includes("gene deletion") || sl.includes("gene disruption")) return "Gene deletion";
  if(sl.includes("carrier") || sl.includes("secretion") || sl.includes("signal peptide")) return "Secretion engineering";
  if(sl.includes("overexpression")) return "Gene overexpression";
  if(sl.includes("rnai")) return "RNAi";
  if(sl.includes("enzyme engineering") || sl.includes("mutagenesis")) return "Enzyme engineering";
  if(sl.includes("morphological") || sl.includes("morphology")) return "Morphological engineering";
  return s.split("+")[0].split("/")[0].trim().slice(0,40);
}

function simplifySpecies(sp) {
  if(!sp) return "Other";
  if(sp.toLowerCase().includes("reesei")) return "T. reesei";
  if(sp.toLowerCase().includes("harzianum")) return "T. harzianum";
  if(sp.toLowerCase().includes("atroviride")) return "T. atroviride";
  if(sp.toLowerCase().includes("afroharzianum")) return "T. afroharzianum";
  if(sp.toLowerCase().includes("guizhouense")) return "T. guizhouense";
  if(sp.toLowerCase().includes("lz117") || sp.toLowerCase().includes("sp.")) return "Trichoderma sp. LZ117";
  return sp;
}

function buildFilters() {
  const strats = [...new Set(DATA.map(d => simplifyStrategy(d.strategy)))].sort();
  const sps = [...new Set(DATA.map(d => simplifySpecies(d.species)))].sort();
  const years = [...new Set(DATA.map(d => d.year))].sort();
  const fStrat = document.getElementById('fStrat');
  strats.forEach(s => { const o = document.createElement('option'); o.value = s; o.textContent = s; fStrat.appendChild(o); });
  const fSp = document.getElementById('fSp');
  sps.forEach(s => { const o = document.createElement('option'); o.value = s; o.textContent = s; fSp.appendChild(o); });
  const fYear = document.getElementById('fYear');
  years.forEach(y => { const o = document.createElement('option'); o.value = y; o.textContent = y; fYear.appendChild(o); });
}

function matches(d) {
  const q = (document.getElementById('search').value || '').toLowerCase().trim();
  const strat = document.getElementById('fStrat').value;
  const sp = document.getElementById('fSp').value;
  const yr = document.getElementById('fYear').value;
  if(strat && simplifyStrategy(d.strategy) !== strat) return false;
  if(sp && simplifySpecies(d.species) !== sp) return false;
  if(yr && d.year !== parseInt(yr)) return false;
  if(q) {
    const blob = [d.title, d.target, d.strategy, d.species, d.promoter, d.signal_peptide, d.description, d.key_results, d.strain].join(' ').toLowerCase();
    return q.split(/\s+/).every(w => blob.includes(w));
  }
  return true;
}

function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function render() {
  const filtered = DATA.filter(matches);
  document.getElementById('stats').textContent = filtered.length + ' of ' + DATA.length + ' papers';
  const container = document.getElementById('cards');
  container.innerHTML = '';
  if(!filtered.length) {
    container.innerHTML = '<div class="no-results">No papers match these filters.</div>';
    return;
  }
  filtered.forEach(d => {
    const yieldStr = d.yield && d.units ? `<div class="yield-badge">&#x25B2; ${esc(d.yield)} ${esc(d.units)}</div>` : '';
    const targetTag = d.target ? `<span class="tag tag-target">${esc(d.target.split('(')[0].trim().slice(0,35))}</span>` : '';
    const metaGrid = [
      d.promoter ? `<div class="meta-item"><span>Promoter</span><span>${esc(d.promoter)}</span></div>` : '',
      d.signal_peptide ? `<div class="meta-item"><span>Signal peptide</span><span>${esc(d.signal_peptide)}</span></div>` : '',
      d.strain ? `<div class="meta-item"><span>Strain</span><span>${esc(d.strain)}</span></div>` : '',
      (d.yield && d.units) ? `<div class="meta-item"><span>Yield</span><span>${esc(d.yield)} ${esc(d.units)}</span></div>` : '',
    ].join('');
    const div = document.createElement('div');
    div.className = 'card';
    div.innerHTML = `
      <div class="card-top">
        <div class="card-header">
          <div class="card-title">${esc(d.title)}</div>
          <svg class="chevron" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4,6 8,10 12,6"/></svg>
          <span class="card-year">${d.year}</span>
        </div>
        <div class="card-meta">
          <span class="tag tag-strat">${esc(simplifyStrategy(d.strategy))}</span>
          <span class="tag tag-sp">${esc(simplifySpecies(d.species))}</span>
          ${targetTag}
        </div>
        ${yieldStr}
      </div>
      <div class="card-body">
        ${d.description ? `<p>${esc(d.description)}</p>` : ''}
        ${d.key_results ? `<div class="section-label">Key results</div><div class="results-text">${esc(d.key_results)}</div>` : ''}
        ${metaGrid ? `<div class="meta-grid">${metaGrid}</div>` : ''}
        <a class="doi-link" href="${esc(d.doi)}" target="_blank" rel="noopener">&#x1F517; ${esc(d.title.slice(0,80))}${d.title.length > 80 ? '…' : ''}</a>
      </div>
    `;
    div.addEventListener('click', e => { if(e.target.tagName === 'A') return; div.classList.toggle('open'); });
    container.appendChild(div);
  });
}

buildFilters();
render();
</script>
